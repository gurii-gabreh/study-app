L.push({c:"Course 1",l:"1-4",t:"Asset & Configuration Management Lifecycles",
s:`Asset（資産）とは intrinsic financial value（本質的な財務価値）を持つもの。CI（構成アイテム）とはサービス提供に必要で tracking（追跡管理）したいエンティティ。Asset は CI であることが多いが、CI は必ずしも Asset ではない（例：business service は CI だが Asset ではない）。

CI の種類：physical entities（computer・router など）と logical entities（データベースインスタンス・Tomcat など）。
Asset は financial value の管理 → Asset Management application で管理。
CI は operational use での tracking → CMDB に格納。

Asset は deploy（展開）されると CI になり、stock（在庫）に戻されるか dispose（廃棄）されるまで CI であり続ける。

Configuration Management：サービスデータと relationships の operational use に焦点。CI の status・attributes・relationships を追跡して IT 環境の正確な情報を維持。
IT Asset Management：procurement（調達）・cost management・depreciation（減価償却）・compliance・disposal（廃棄）の管理。

CSDM はライフサイクルのステージとステータスを整合させ hardware assets と CMDB の CI を同期させる。

両者は complementary（補完的）であり ITSM において統合されることが多い。目標は operational efficiency と financial accountability の両立。`,

L.push({c:"Course 1",l:"1-6",t:"Steps to Deploying a Trustworthy CMDB",
s:`key business initiatives と strategic IT initiatives を特定することが出発点。会社が既に使用している言語で表現することで faster buy-in が得られる。4つのステップは必ずしも linear（線形）ではない。

Step 1：Set Direction
clear goals・actionable objectives・measurable business outcomes から始める。What・How・Why・Measure の4つの問いに答える。reporting needs はデータ投入前の設計段階で決定する。方向性なしの構築は「flying while building a plane（飛行中に飛行機を組み立てる）」ようなもの。

Step 2：Build Team and Governance Model
Configuration Control Board（CCB・構成管理委員会）を結成。executives からの early buy-in が credibility・trust・adoption を向上。CMDB のデータは CMDB チームが所有しない。適切な data owners を特定しガバナンスに参加させることが不可欠。CMDB チームが検証できるのは duplicate records・missing attributes などの基本的なチェックのみ。

Step 3：Design Data Model
use cases を支援するデータのみを格納。out-of-the-box CI classes で fastest time to value を目指す（例：Firewall・Server・Application）。CSDM を理解し活用することを推奨。

Step 4：Operationalize and Govern
3本柱：Ingestion（データフローの自動化）・Governance（データの管理・維持）・Insight（データの可視化・活用）。「garbage in – garbage out」の原則を意識する。

導入効果：incident/problem/change/asset management の促進・strategic planning の支援・single source of truth による collaboration 強化・failed changes リスクの低減・audits の促進・root cause analysis の支援。`,

Ingestion ツール：
・ServiceNow Discovery（Horizontal/Agentless discovery）：自動ディスカバリー・インフラマッピング。有償（ITOM Visibility の一部）。non-discoverable data で補完が必要。
・Service Mapping（Top-down/ML powered mapping）：Top-Down Mapping・Dynamic Updates。有償（ITOM Visibility の一部）。CSDM ガイドライン準拠を推奨。
・Agent Client Collector（ACC/Agent based discovery）：エージェントインストール必須。software utilization data を収集。有償。
・Service Graph Connectors：Azure・InTune・MS SCCM・Jamf・AWS など。有償（SCCM のみ無償）。credentials 必要。
・IntegrationHub ETL：ETL 自動化。non-CMDB テーブルもサポート。無償（Store 経由）。
・Import Sets and Transform Maps：最古の方法。デフォルトで IRE を使用しない→transform map script で IRE 通過を強制することを推奨。無償。

Governance ツール：
・CMDB Health Dashboard：Completeness・Correctness・Compliance の3観点。scheduled jobs はデフォルトでオフ→手動アクティベートが必要。無償。
・CMDB Data Manager：Data Certification・Lifecycle Policies・Attestation Policies。無償。
・Duplicate CI Remediation Wizard：重複CIの自動検出・Merge/Delete。manual effort 必要。無償。
・De-Duplication Templates：スケジュール自動実行。公開前に in-depth testing を推奨。無償。

Insight ツール：
・CMDB Query Builder：drag-and-drop・AND/OR フィルタリング。無償。
・Unified Map：Interactive Visualization・Dependency Mapping。無償。
・Intelligent Search：NLQ（natural language query）による AI-Powered 検索。NLQ により必要スキルが大幅削減。無償。
・CMDB and CSDM Data Foundations Dashboards：Visibility・Policy Compliance・Playbooks。無償（Store 経由）。`,

s:`CI Class Manager は CMDB 内の CI とクラスを管理する centralized ツール。tree-view format でCMDBクラス階層を一元管理する。

主な利点：Centralized Management・Class Definitions and Settings（identification rules・reconciliation rules・CMDB Health）・Hierarchy and Relationships・Attributes and Rules Management・Health and Compliance（compliance audits・certification filters・templates）・Extensibility・Improved Data Accuracy

【重要】新しい CMDB クラスの作成は慎重に。ライセンス・governance・insight への影響あり。まず CMDB CI Class Models をインストールして既存クラスを確認し、必要なら既存クラスを extend することを推奨。作成権限：sn_cmdb_admin and personalize_dictionary または admin ロールのみ。

technical debt 解消：CI Class Manager で baseline class を特定し、CIをカスタムクラスから標準クラスへ attributes を正しくマッピングして移動。

Principal Class：ITSMレコードの「Configuration Item」参照フィールドに表示されるCIをフィルタリング。例：「Servers」を設定するとサーバー関連CIのみが表示される。

Managed By Group：technical service offering で設定した場合は CI Class Manager の設定より優先される。

Identification Rules：Name・Serial Number・Device ID・Object ID・Configuration file などで一意に識別。
Reconciliation Rules：どの discovery sources が特定のCI属性を更新できるかを指定。未承認ソースによる上書きを防止。Data refresh rules で上位優先度ソースが更新していない場合のデータ更新方法を管理。
Suggested Relationships：predefined recommendations。例：Provides Power for :: Receives Power From / Runs on :: Hosts。不適切例：a rack runs on a server / a server runs on a database。

従来の設定方法：application navigator から各アプリケーションに直接アクセス。複数テーブルの設定を single list view で確認したい場合に有用。`,

L.push({c:"Course 2",l:"2-2",t:"IRE（Identification and Reconciliation Engine）概要",
s:`IRE（Identification and Reconciliation Engine・識別と照合エンジン）は CMDBを維持するために payloads（ペイロード）を処理する framework。新しいCIの作成と既存CIの更新を担う。

複数ソース（Discovery・AWS・SCCM など）からのデータ取り込みで、最後に更新したソースによってデータ属性が flop back and forth（行き来）する問題が生じる。IRE はこの問題を解決する。

IRE は CMDB への healthy data 取り込みにおいて crucial（不可欠）な中心的コンポーネント。accurate and consistent data の確保・duplicate CIs の削減・CMDBの integrity の維持・unauthorized data sources からの更新の防止を実現。

4つのコア機能：
・Identification（識別）：CIがCMDB内に存在するか newly discovered CI かを判断。identification rules に基づいてattributes からCIを一意に識別
・Reconciliation（照合）：複数データソースからのCIデータを照合・統合
・Deduplication（重複排除）：重複CIを検出・解決（後続レッスンで詳細）
・Reclassification（再分類）：CIを適切なクラスに再分類（後続レッスンで詳細）

IRE は centralized set of APIs を提供。データソースは CMDB に直接書き込まず APIs を呼び出す→inconsistencies（不整合）を防止。

Identification Rules と Reconciliation Rules はデータ取り込み時に連携して duplicate CI records の防止・CI attributes の照合・authoritative data sources のみがCIを更新できることを確保する。`,

["IREの役割","healthy data のCMDBへの取り込みにおいて crucial（不可欠）な中心的コンポーネント","accurate and consistent data の確保・duplicate CIs の削減・integrity の維持"],
["コア機能①：Identification","CIがCMDB内に存在するか newly discovered CI かを判断","identification rules に基づいて attributes からCIを一意に識別"],

// アプリ側ウィンドウの参照
let appWindow = null;

// アプリURLを同じリポジトリのindex.htmlと仮定（同一オリジン）
function getAppUrl(){
  const here = location.href;
  return here.replace('all_lessons_data.html','').replace(/\/$/, '') + '/';
}

// アプリを新しいタブで開く（または既存タブを使う）
function openApp(){
  appWindow = window.open(getAppUrl(), 'cmdb_study_app');
  showToast('アプリを開いています…タブが開いたら送信ボタンを押してください', '#1f6feb');
}

// 1レッスン送信
function sendLesson(idx, btnId){
  const l = L[idx];
  const payload = {
    type: 'CMDB_IMPORT_LESSON',
    lesson: {
      course: l.c, lesson: l.l, title: l.t,
      summary: l.s,
      points: l.p,
      quiz: l.q.map(q => ({
        type: q.t, q: q.q, opts: q.o, ans: q.a, exp: q.e
      }))
    }
  };

  if (!appWindow || appWindow.closed) {
    appWindow = window.open(getAppUrl(), 'cmdb_study_app');
    // ウィンドウが読み込まれてから送信
    const btn = document.getElementById(btnId);
    btn.textContent = '⏳ アプリ起動中…';
    setTimeout(() => {
      trySend(payload, btnId, 0);
    }, 2500);
  } else {
    trySend(payload, btnId, 0);
  }
}

// 全レッスン一括送信
function sendAll(btnId){
  const payload = {
    type: 'CMDB_IMPORT_ALL',
    lessons: L.map(l => ({
      course: l.c, lesson: l.l, title: l.t,
      summary: l.s, points: l.p,
      quiz: l.q.map(q => ({ type: q.t, q: q.q, opts: q.o, ans: q.a, exp: q.e }))
    }))
  };

  if (!appWindow || appWindow.closed) {
    appWindow = window.open(getAppUrl(), 'cmdb_study_app');
    const btn = document.getElementById(btnId);
    btn.textContent = '⏳ アプリ起動中…';
    setTimeout(() => { trySend(payload, btnId, 0); }, 2500);
  } else {
    trySend(payload, btnId, 0);
  }
}

function trySend(payload, btnId, retry){
  try {
    appWindow.postMessage(payload, '*');
    const btn = document.getElementById(btnId);
    if(btn){ btn.textContent = '✅ 送信完了！'; btn.classList.add('cp');
      setTimeout(()=>{ btn.textContent = btn.dataset.orig || '🚀 アプリへ送信'; btn.classList.remove('cp'); }, 3000); }
  } catch(e) {
    if(retry < 3){ setTimeout(()=>trySend(payload, btnId, retry+1), 800); }
    else { showToast('送信に失敗しました。アプリタブを開いてから再試行してください', '#da3633'); }
  }
}

function showToast(msg, color='#58a6ff'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:20px;right:20px;background:#21262d;border:1px solid ${color};color:#e6edf3;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// postMessage 完了受信 & CMDB_REQUEST_ALL への応答
window.addEventListener('message', e => {
  if(e.data?.type==='CMDB_IMPORT_DONE') showToast(`✅ 「${e.data.title}」をアプリに追加しました`);
  if(e.data?.type==='CMDB_IMPORT_ALL_DONE') showToast(`✅ ${e.data.count}レッスンをアプリに追加しました`);

  // アプリ側からデータ送信要求を受けたら全レッスンを送信する
  if(e.data?.type==='CMDB_REQUEST_ALL') {
    const payload = {
      type: 'CMDB_IMPORT_ALL',
      lessons: L.map(l => ({
        course: l.c, lesson: l.l, title: l.t,
        summary: l.s || '', points: l.p || [], quiz: l.q || []
      }))
    };
    // 送信元（アプリ）ウィンドウに返信
    const target = e.source || window.opener;
    if (target) {
      target.postMessage(payload, '*');
      showToast(`📤 ${L.length}レッスンをアプリへ送信しました`);
    }
  }
});

// ── DOM 構築 ──────────────────────────────────
const cnt=document.getElementById('cnt');
const courses={};
L.forEach(l=>{if(!courses[l.c])courses[l.c]=[];courses[l.c].push(l);});

// 一括送信ボタン
const allRow = document.createElement('div');
allRow.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;';
allRow.innerHTML=`
  <button class="btn btnp" style="padding:8px 20px;font-size:13px;" onclick="openApp()">🔗 アプリを開く</button>
  <button class="btn" id="send_all" data-orig="🚀 全レッスンをアプリへ送信" style="padding:8px 20px;font-size:13px;border-color:#3fb950;color:#3fb950;" onclick="sendAll('send_all')">🚀 全レッスンをアプリへ送信</button>
  <span style="font-size:11px;color:#6e7681;">※先に「アプリを開く」でアプリタブを開いてから送信してください</span>
`;
cnt.appendChild(allRow);

Object.entries(courses).forEach(([course,lessons])=>{
  const sec=document.createElement('div');
  sec.className='stitle';sec.textContent=course;
  cnt.appendChild(sec);

  lessons.forEach((l,idx)=>{
    const globalIdx=L.indexOf(l);
    const bid=`${course.replace(/\s/g,'')}_${l.l.replace(/\./g,'')}_${idx}`;
    const block=document.createElement('div');
    block.className='lb';
    block.innerHTML=`
      <div class="lh">
        <span class="chip">${l.c} · ${l.l}</span>
        <span class="lt">${l.t}</span>
        <span class="qc">${l.q.length}問 / ポイント${l.p.length}行</span>
      </div>
      <div class="br" style="margin-top:8px;">
        <button class="btn btnp" id="send_${bid}" data-orig="🚀 アプリへ送信"
          onclick="sendLesson(${globalIdx},'send_${bid}')">🚀 アプリへ送信</button>
      </div>
    `;
    cnt.appendChild(block);
  });
});

L.push({c:"Course 2",l:"2-6",t:"Dynamic Reconciliation Rules（動的照合ルール）",
s:`Dynamic Reconciliation Rules（動的リコンシリエーション・ルール）はMultisource CMDBのデータを活用して複雑なデータ照合シナリオを処理するルール。「最大の値」や「最初に報告された値」などの基準に基づいて値を選択する。

Static vs Dynamic：Static Reconciliation Rules（静的ルール）はどのディスカバリソースがクラス属性を更新する権限を持つかを定義し優先順位を確立する。Dynamic Reconciliation Rulesは Multisource CMDBデータを使用して基準に基づいて値を選択する。

同じCI属性に静的ルールと動的ルールの両方がある場合、動的ルールが優先される（Dynamic wins over Static）。

前提条件：「動的リコンシリエーション・ルール」オプションはMultisource CMDBが有効化された後にのみ利用可能。

動的ルールのタイプ（5種類）：
・First Reported（最初に報告された）：最初にディスカバリされた値を使用
・Most Reported（最も報告された）：最も多くのソースから報告された値を使用
・Last Reported（最後に報告された）：最後にディスカバリされた値を使用
・Largest Value（最大値）：数値フィールドにのみ適用。最も大きい値を使用
・Smallest Value（最小値）：数値フィールドにのみ適用。最も小さい値を使用

注意：Largest Value・Smallest Valueは数値フィールド型にのみ適用。「属性の選択」タブには数値フィールド型のみが表示される。

IRE処理フロー：まず現在のpayloadを処理し、次にMultisource CMDBデータをレビューして適切な値を決定する。

例1：Windows ServerクラスのRAM属性に「Largest Value」ルール設定。ServiceNow(100)・Tivoli(200)・LANDesk(300)の静的ルールも存在。→ 動的ルールが優先されるため、Multisource CMDBのプレビューデータに基づきLANDesk最大値で更新。

例2：Serverクラス→Largest Value / Windows Serverクラス→Most Reported。→ Windows Serverクラスにより具体的なルールがあるためServerクラスの動的ルールは使用されない。

重要ポイント（優先順位ルール）：
1. 特定クラス内の動的ルールは親クラスのルールより優先される
2. クラスにルールがなければ親クラスのルールを継承する
3. 同一属性に静的と動的の両方がある場合は動的が優先される`,

L.push({c:"Course 3",l:"3-2",t:"ServiceNow Discovery 詳細",
s:`ServiceNow Discovery はスケジュールベースの automated discovery solution（自動ディスカバリソリューション）。別名：Horizontal discovery・Agentless discovery・IP-based discovery。ITOM Visibility の一部として提供され有償ライセンス必要。

対応プラットフォーム：Windows・Linux・macOS・クラウド環境。収集データはすべて IRE に送信され CMDB での重複レコードを回避する。スケジュールベースのため real-time discovery solution（リアルタイムディスカバリ）ではない。真のリアルタイムディスカバリには Agent Client Collector（ACC）を使用する。

Discovery の4フェーズ：
1. Scan Phase（スキャンフェーズ）：ネットワークをスキャンしてすべての IP 対応デバイスを特定する。IP アドレスまたは範囲をスイープしてネットワーク内のライブホストを検出する。
2. Classification Phase（分類フェーズ）：検出されたデバイスをタイプ（サーバー・ルーター・スイッチ・プリンターなど）に基づいて分類する。probes と sensors を使用してデバイスタイプを判定する。
3. Identification Phase（識別フェーズ）：デバイスを一意に識別するためにシリアル番号・MAC アドレス・ホスト名・IP アドレスなどを収集する。identification rules を使用して既存CIとのマッチングを行い、マッチが見つからない場合は新しいCIを作成する。
4. Exploration Phase（探索フェーズ）：各識別デバイスの詳細データを収集する。Discovery probes と patterns の組み合わせを使用する。

MID Server：ServiceNow インスタンスと組織の内部ネットワークの bridge（橋渡し）として機能。ファイアウォール・セキュリティ・ネットワークセグメンテーションがある環境で特に重要。組織の trusted network environment 内で動作し機密データが組織外に出ないことを確保。encrypted communication を使用。プロトコル：WMI（Windows）・SSH（Unix/Linux）・SNMP（ネットワークスイッチ・プリンター）

Discovery Schedules：Discovery Admin Workspace の Schedules ページが central hub。スコープ・タイミング・MID Servers を定義する。

範囲制限：初期実装では Limited Range から開始を推奨。Broader Range（192.168.0.0/24）はネットワーク・ブロードキャストアドレスを含み過剰データの可能性あり。Limited Range（192.168.0.1〜192.168.0.254）は初期実装に推奨。最大範囲 /16（65,000 IP アドレス）に制限推奨。

Discovery Configuration Console：検出するデバイス・アプリケーション・ソフトウェアのタイプを指定。アクセス：Discovery Definition > Configuration Console。

Discoverable Data：Hardware（CPU・メモリ・ストレージ）・Software（インストール済みアプリ・OS）・Network（IP・MAC・トポロジー）・Cloud（AWS・Azure・GCP）。Discovery がデバイスを識別すると discovery source フィールドが「ServiceNow」に設定される。Asset Management で作成されたレコードは「SNAssetManagement」→Discovery 後「ServiceNow」に更新。

Non-Discoverable Data：Assigned to・Owned by・Support group・Change Group・Managed By Group などは自動検出不可。ServiceNow はディスカバリデータに non-discoverable data を補充することを強く推奨する。`,

L.push({c:"Course 3",l:"3-5",t:"IntegrationHub ETL",
s:`ServiceNow IntegrationHub ETL（IH-ETL）はサードパーティデータをCMDBまたは非CMDBテーブルに統合するためのETL（Extract・Transform・Load）transform mapsを作成・管理するストアアプリケーション。インポートされたデータはIREを通じて自動処理され、データ品質の向上と重複の最小化が図られる。Service Graph ConnectorsはIntegrationHub ETLのtransform mapsを活用してCMDBへのデータ取り込みを準備する。

Why Use：Data Integrity（IRE経由でデータをルーティングしCMDBの整合性を維持）・Consistent and Efficient（ソースデータのtransformとマッピングを簡素化）・Improved Data Quality（少量サンプルデータでテスト・レビューを繰り返して期待する成果を達成）

2つの主要コンポーネント：
1. RTE（Robust Transform Engine）：ステージングテーブルのraw source dataをETL transform mapsを使用してマッピング・統合されたデータに変換する
2. IRE（Identification and Reconciliation Engine）：様々なデータソースにわたる識別と照合を管理するcentralized framework。duplicate CIsなどの問題を防止しターゲットテーブルの整合性を確保する

プロセスフロー：①外部データをImport Setsとしてステージングテーブルに保存→②RTEがIRE payloadsを生成→③IREが照合を実行→④CMDBに格納

用語：CMDB Application（サードパーティベンダーの名前。Name・Discovery Sourceの2属性。1つのCMDB Applicationは複数のETL transform mapsを持てる）・ETL Transform Map（IntegrationHub ETLが生成する出力物）・Data Source（生ソースデータのソースフィード。異なるタイプのデータには各REST endpointが独自のData SourceとETL transform mapに関連付けられる）

ETL Transform Map Assistant（ガイド付きセットアップ）4ステップ：①Basic Details（基本情報入力）②Preview and Prepare Source Data（データプレビュー・クレンジング）③Select CMDB Classes and Map Source Data（CMDBクラス選択・フィールドマッピング）④Preview and Schedule（テスト実行・スケジュール設定）

CMDB Integrations Dashboard：Integration Commons for CMDB（sn_cmdb_int_util）に含まれる。全CMDB統合のkey performanceとエラーメトリクスを公開する。

Non-CMDB Table Support：glide.identification_engine.non_cmdb_tablesで指定されたテーブルのみサポート。サポートテーブル：Location・Department・Cost Center・Building・User・Group。identification rulesの作成が必要。`,

L.push({c:"Course 3",l:"3-7",t:"Service Graph Connectors（サービスグラフコネクター）",
s:`Service Graph Connectors（サービスグラフコネクター）は外部システムとデータソースをServiceNowと接続することで、CMDBへのデータのインポート・正規化・高品質なデータの維持を支援するspecialized integrations（専門的な統合）である。

CMDBはorganizationのdigital foundationでありServiceNowの基盤。CMDBがhealthyかつtrustworthy状態を維持するために自動化された方法でデータを取り込むことを推奨。ITOM Visibility（Discovery・ACC・Service Graph Connectors）がfastest time to valueを提供。

カテゴリ（7種類）：Partner cloud providers・Endpoint or IT asset management applications・Monitoring and observability applications・Security solutions・Software/server/network applications・Operational Technology（OT）applications・Partner-built connectors

out-of-the-box connectors：AWS・Azure・VMwareなど。extensive customizationなしで統合プロセスを簡素化するよう設計。

特徴：
・各コネクターはIREを使用してデータが適切に取り込まれることをレビュー済み（重複防止・重要データの上書き回避）
・各コネクターはCSDM conformance（CSDMへの準拠）についてレビュー済み
・すべてのコネクターはIntegrationHub ETLを活用（管理者がマッピングを表示・変更可能）

L.push({c:"Course 3",l:"3-8",t:"Import Sets and Transform Maps",
s:`Import Sets and Transform Maps はCMDBにデータをインポート・変換するための最も古い方法。最新リリースではIntegrationHub ETLがより現代的で簡素化されたUIを提供しネイティブでIREを活用して重複を防止するため推奨される。

Import Sets（インポートセット）：CSV・Excel・外部データベースなどの外部ソースからraw dataをServiceNowの temporary staging table（一時的なステージングテーブル）にインポートする。

Transform Maps（変換マップ）：Import Set（ステージングテーブル）のデータをIncident・Problem・CMDBテーブルなどの適切なターゲットテーブルにマッピングする。カスタムロジック・データクレンジング・検証もサポート。field mappings・coalesce values・scriptable actionsを定義する。

CMDBデータインポート計画時の考慮事項：①どのCIクラスが関与するか②どの属性がインポートされるか③ユニークレコードの識別方法（coalesce fieldsまたはIRE identification rules）④ターゲットクラスのmandatory fieldsのマッピング⑤特定の処理やカスタムロジックの要否

CMDBインポートプロセスの3ステップ：①ソースデータをレビューしターゲットテーブル要件を理解→②変換マップを構築し実行順序を定義→③インポートデータとrelationshipsが期待通りに作成されていることを確認

IREのデフォルト動作：デフォルトではIREは使用されない。管理者がTransform MapにカスタムのonBefore scriptを設定しない限りIREは使用されない→重複レコードが発生する可能性がある。

IREを使用するには：Transform MapにonBefore scriptを設定してCMDBTransformUtil APIを呼び出す。APIがソースデータを前処理しImport SetのデータをIREに渡す。CMDBTransformUtil APIが呼び出されるとcoalesce valuesは無視される（技術的に不要）。

IREの処理結果：新規→ターゲットテーブルにレコードを挿入 / 既存→CMDBの既存CIをソースレコードのデータで更新。`,
p:[

L.push({c:"Course 3",l:"3-9",t:"Populate Foundation Group Data（基盤グループデータの投入）",
s:`Discovery等でデータ取り込み後、non-discoverable dataであるグループ情報・ロケーション情報を補充することがCMDB管理者のcrucial（不可欠）な次のステップ。グループ情報はインシデント発生時・変更実施時にessential（不可欠）。

主要なグループフィールド：
・Managed By Group：Data Managerタスク（attestation・life cycle・certification policies）の割り当てを効率化
・Support Group：Incident Assignment Groupにマッピングされincident routing（インシデントルーティング）を効率化
・Change Group：Change Assignment Groupにマッピングされchange routing（変更ルーティング）を効率化

Incident Routing：受信インシデントを事前定義された基準に基づいて適切なチームまたは個人に自動的に振り分けるプロセス。応答時間の改善・解決時間の短縮・IT サービス管理の効率向上を実現。

Change Routing：変更管理プロセス内の事前定義されたルールに基づいて変更リクエストを適切なグループまたは個人に自動的に振り分けるプロセス。

グループデータ追加後は定期的にaudit（監査）して正確性を確保することがcrucial。ServiceNow の Data Manager で certification policies を設定可能。

グループフィールドを自動投入する2つの方法：

Method 1：CI Class Manager
・特定クラスのManaged By Groupを設定。クラス内すべてのCIに自動同期される
・Technology Management Offeringに関連付けられていないCIのみに適用
・extended classesのCIには同期されない

Method 2：Technology Management Offering（旧称：Technical Service Offering）
・Support group・Change group・Managed By Groupの3つをオファリング内で直接設定
・オファリングに関連付けられたCIに適用
・Managed By GroupはまずdynamicCI groupと同期され、次にその動的CIグループの一部のCIと同期→CI Class Managerの設定を上書き
・設定方法①：Forms（各種フォームを直接入力）②：Service Builder（ServiceNow Storeの無償アプリ。ガイド付きステップバイステップフロー）

優先順位：Priority 1→Technology Management Offering / Priority 2→CI Class Manager（Offeringの設定がCI Class Managerより優先）`,

L.push({c:"Course 4",l:"4-2",t:"Introduction to CMDB Health（CMDB健全性の概要）",
s:`多くの企業がCMDBを実装しているにもかかわらず、データの運用化に苦戦している。CMDBのhealth issuesはaccuracy・completeness・reliabilityにdownstream effects（下流への影響）をもたらす。

重要な名言：「You can't manage what you can't measure.（測定できないものは管理できない）」― Peter Drucker

CMDB Health Dashboardの3スコアカード：
1. Completeness（完全性）：required・recommendedフィールドデータの投入状況へのinsightを提供。使用メトリクス：Recommended・Required
2. Compliance（コンプライアンス）：auditsと呼ばれる確立された標準とポリシーへのCMDBの準拠状況の可視性を提供。使用メトリクス：Audit
3. Correctness（正確性）：CMDB内のデータが正確でIT環境の真の状態を反映しているかを検証。使用メトリクス：Duplicate・Orphan・Staleness

全体スコアの計算：個々のメトリクスの平均ではない。すべての定義されたメトリクス基準を通過したCIのパーセンテージ。例：個々メトリクスが93%・100%・96%でも全体スコアが89%になる場合がある。

Health Inclusion Rules：管理者がCMDB Health Dashboardの評価に含めるCIクラスを定義できるconfiguration settings。組織が管理責任を持つCIクラスのみのメトリクスを計算するよう設定することがbest practice。利点：Selective Class Tracking・Granular Control・Customizable Metrics・Operator-Based Rules（「is a」でクラス階層全体を含める）

CMDB Group Health Dashboard：CMDBグループの集約されたヘルスレポートのcentralized view。グループ内すべてのCIの全体的な健全性を表示。クラスを切り替えなくてもすべてのCIクラスの健全性メトリクスを一箇所で表示可能。

チェックリスト：①Prevent bad data（baseline identification rulesの有効性確保・定期レビュー）②Regularly review the CMDB Health Dashboard（duplicate・stale CIの特定とタスク割り当て）③Conduct data quality reviews（Managed By Group・Support Group・Serial Numberなどの欠落確認）`,

L.push({c:"Course 4",l:"4-3",t:"Completeness Scorecard（完全性スコアカード）",
s:`Completeness Scorecard（完全性スコアカード）はCMDBのCIとCIクラスがどの重要なデータを欠いているかを追跡するツール。Recommended・Requiredの2つのメトリクスを使用する。

重要：ServiceNow base systemはCMDB内のrequiredまたはrecommended CI attributesの事前定義された提案を提供しない。どのフィールドが必須かを決定するのはCMDB管理者と他のステークホルダーの責任。

Required Fields（必須フィールド）：database functionality（データベース機能）として強制。フィールドが空の場合エラーが発生する。システムプロパティglide.required.attribute.enabledはデフォルトでtrue。

Recommended Fields（推奨フィールド）：visibility（可視性）のためにのみ使用。属性が投入されていない場合でもデータベースエラーは発生しない。

推奨事項：support groupなどのフィールドはほとんどのディスカバリツールが収集しないため、requiredではなくrecommendedとして設定することを推奨。

Required Fields の設定方法：CI Class Manager > Hierarchy > クラス検索 > Class Info > Attributes タブ > フィールド > Mandatory チェックボックス > Update。Dictionary Overrideで子クラスにのみrequiredを適用できる（例：Serial NumberをHardwareクラスとその拡張クラスにのみrequiredにする場合）。

Recommended Fields の設定方法：CI Class Manager > Hierarchy > クラス検索 > Health > Completeness > Recommended Fields タブ > フィールドを右側に移動。

Completeness Score 計算ジョブ：CMDB Health Dashboard > CMDB Health Settings > Scheduled Jobs > Completeness Score Calculation。ステータス確認：cmdb_health_metric_status.list

Required フィールドでのIRE統合エラー回避：glide.required.attribute.enabledをfalseに設定（Configuration > CMDB Properties > Identification/Reconciliation Propertiesまたはsys_properties.listから）

メリット：Improved Data Quality・Proactive Issue Identification・Enhanced Visibility・Process Efficiency・Better Compliance・Supports CMDB Governance`,

L.push({c:"Course 4",l:"4-4",t:"Compliance Scorecard（コンプライアンススコアカード）",
s:`Compliance Scorecard（コンプライアンススコアカード）は監査結果に基づきCIが組織の定義した基準に準拠しているかを監査・可視化するツール。使用メトリクス：Audit。

例：すべてのワークステーションにウイルス対策ソフト必要 / すべてのLinuxサーバーに最新パッチ適用 / すべての本番サーバーにサポートグループと管理グループ割り当て。一般的ユースケース：システムアップグレードの管理（OSアップグレードに必要な最小ハードウェア要件を満たしていないサーバーを特定）。

監査は特定フィールドの実際の値を、テンプレートまたはスクリプト監査で定義された期待値と比較する。CIがCMDB Health監査テストに合格するにはすべての監査に準拠が必要。

4つの構成要素：
①Certification Filter（認証フィルター）：特定タイプのCIから監査の範囲を定義。設定：CI Class Manager > Hierarchy > クラス > Health > Compliance > Certification Filter。Compliance > Filtersからも設定可能。
②Certification Template（認証テンプレート）：監査に合格するための条件を定義（属性・relationships・参照フィールド値）。設定：CI Class Manager > Health > Compliance > Certificate Template > 監査タイプをDesired Stateに設定 > 保存。Compliance > Templatesからも設定可能。
③Audit（監査）：認証テンプレートで定義された期待値に対して実際の属性を比較。フォローオンタスクの作成・割り当て可能。設定：CI Class Manager > Health > Compliance > Audit。Compliance > Auditsからも設定可能。
④Compliance Score Calculation Job：Configuration > Health Preferences > Scheduled Jobs > Compliance Score Calculationジョブ > Activate > Execute Now。ステータス確認：cmdb_health_metric_status.list。管理者ロールで実行が必須。

重要：CMDB Health Dashboardに含めるには監査タイプを「Desired State」に設定が必要。「Compliance」や「Compliance Architecture」などはCMDB Health Dashboardには含まれない。

スクリプト監査：Certification Templateの条件が具体的でない場合の代替手段。certification_adminロールが必要。設定：Compliance > Desired State > Scripted Audits > Audits（CI Class Managerからは作成不可）。コンプライアンススコアカードで計算される監査タイプはDesired State監査とスクリプト監査の2つのみ。

Data Manager Certification Policy vs Desired State監査：前者は属性の手動検証用（non-discoverable data向け）、後者は特定フィールドが空でないかの自動チェック用。`,

L.push({c:"Course 4",l:"4-5",t:"Correctness Scorecard（正確性スコアカード）",
s:`Correctness Scorecard（正確性スコアカード）はCMDBデータの品質を3つのメトリクス（Duplicates・Orphans・Staleness）で評価する。重複・陳腐化・孤立CIを含むCMDBはユーザーの信頼を損なう可能性がある。

重複メトリクス（Duplicates）：識別ルールに基づいて重複CIを検出し、最も古いCIレコード（作成日基準）がデフォルトで非重複として扱われる。新しいCIは「Duplicate Of」フィールドでフラグ付けされる。独立したCIのみが評価対象（例：ハードウェアレコードなどの非アプリケーションCI）。

孤立メトリクス（Orphans）：他のCIとの必要な関係性を維持しなくなったCIをフラグ付けする。ベースシステムには孤立ルールが存在しない。孤立CIを追跡するには管理者が孤立ルールを自分で作成する必要がある。クラスごとに1つの孤立ルールのみが許可される。
孤立ルール例：サーバーとの関係がないアプリケーション / WARファイルとの関係がないTomcatアプリケーション / 所有者のないハードウェアデバイス / ESXサーバーとの関係がない仮想マシン

陳腐化メトリクス（Staleness）：指定された期間CMDBで更新されていないCIを検出する。ベースシステムではcmdb_ciクラスレベルで1つの陳腐化ルールが定義されており、CIが60日間更新されていない場合に陳腐化と見なす。更新はsys_updated_onフィールドで判定。

陳腐化ルールのカスタマイズ推奨：ディスカバリー頻度に基づいてクラスごとにカスタマイズ可能。例：ネットワークデバイスが14日ごとにスキャン→21日に設定推奨 / サーバーが毎日検出→7日に設定可能。`,
p:[
["定義","Correctness Scorecardは重複（Duplicates）・孤立（Orphans）・陳腐化（Staleness）の3メトリクスでCMDBデータの品質を評価する","重複・陳腐化・孤立CIを含むCMDBはユーザーの信頼を損なう可能性がある"],

{t:"基礎",q:"複数の重複CIが存在する場合にどのCIが正規のレコードとして扱われるか？",o:["最も新しいCIレコード","最も古いCIレコード（作成日基準）がデフォルトで非重複として扱われる","最初に更新されたCIレコード","Discovery Sourceが最も信頼できるCIレコード"],a:1,e:"正確性スコア計算ジョブの実行後、作成日に基づいて最も古いCIレコードがデフォルトで非重複として扱われる。より新しいCIレコードは「Duplicate Of」フィールドで最も古いCIの重複としてフラグ付けされる。"},
{t:"基礎",q:"孤立メトリクスのベースシステムにおける状態として正しいものはどれか？",o:["ベースシステムには多数の孤立ルールが事前定義されている","ベースシステムには孤立ルールが存在しない。孤立CIを追跡するためには管理者が孤立ルールを自分で作成する必要がある","孤立ルールはHealth Inclusion Rulesに含まれている","孤立ルールはCompleteness Scorecardで管理される"],a:1,e:"ベースシステムには孤立ルールが存在しないことに注意が必要。孤立CIを追跡するには管理者が孤立ルールを作成する必要がある。また孤立ルールはクラスごとに1つのみ設定可能。"},

{t:"引っ掛け",q:"ネットワークデバイスが14日ごとにスキャンされる場合の推奨陳腐化ルール設定として正しいものはどれか？",o:["14日に設定する","21日に設定することを推奨する","60日（デフォルト）のまま使用する","7日に設定する"],a:1,e:"ネットワークデバイスが14日ごとにスキャンされる場合、このクラスの陳腐化ルールを21日に設定することを推奨する（スキャン間隔の約1.5倍）。デフォルトの60日を環境に合わせてカスタマイズすることがbest practice。"},

L.push({c:"Course 4",l:"4-6",t:"重複の管理（Managing Duplicates）",
s:`CMDB内の重複CI（Duplicate CI）は重大なデータ整合性の問題を引き起こす。レポート・インシデント解決・変更管理など全般に影響する。

重複CIの発生原因：①自動ディスカバリーツール（複数ツールが同じCIを異なる方法で識別）②インポートセット（適切な識別・調整ルールなし）③サードパーティ統合（適切な識別ロジックなし）④手動入力（ガバナンス不足・命名規則未遵守）⑤不完全または不正確な識別ルール⑥ガバナンスの欠如

重複の判定：IREがCIが属するクラスの識別ルールに基づいて一致する2つ以上のCIを見つけた場合に重複と判定。ServiceNow Discovery中に重複CIが見つかった場合も同様の処理。最も古いCI（作成日基準）を更新し、重複排除タスクを作成してCMDB Workspaceから確認可能。

重要：Discovery Sourceフィールドが入力済みの重複CIはCMDB Health Dashboard正確性スコアカードでフラグ付けされない（IREがすでに処理済みと判断するため）。ただし再検出・再処理されると重複としてフラグ付けされ重複排除タスクが生成される。

重複排除タスク：潜在的な重複CIが識別されると自動的に作成。①重複の識別②タスクの作成③レビューと解決（マージ・更新・削除）のフロー。レガシーインスタンスはDe-duplication Tasksモジュール、CMDB Workspace導入後はワークスペースから直接表示・解決可能。

システムプロパティ：glide.identification_engine.skip_duplicates（デフォルトtrue）・glide.identification_engine.skip_duplicates.threshold（デフォルト5）。trueかつ重複数がthreshold未満の場合、最も古いCIが一致として選択・更新され、残りは「Duplicate of」フィールドでタグ付けされる。

防止策：識別ルールに焦点を当て、インポート・サードパーティ統合中にIREを活用し、CIレコードの手動作成に関するガバナンスを確立する。`,

["Discovery Sourceフィールドと重複フラグ","Discovery Sourceフィールドが入力済みの重複CIはCMDB Health Dashboard正確性スコアカードでフラグ付けされない","IREがすでに処理済みと判断するため。再検出・再処理されると重複としてフラグ付けされる"],
["重複排除タスクのフロー","①重複の識別（一致する属性に基づく）②タスクの作成（適切なチームに割り当て）③レビューと解決（マージ・更新・削除）","レガシー：De-duplication Tasksモジュール / 新バージョン：CMDB Workspaceから直接表示・解決"],

{t:"意地悪",q:"重複排除タスクへのアクセス方法の変化として正しいものはどれか？",o:["常にCMDB Workspaceからのみアクセスできた","レガシーインスタンスではDe-duplication Tasksモジュールからのみ。CMDB Workspace導入後はワークスペースから直接表示・解決できるようになった","常にDe-duplication Tasksモジュールからのみアクセスできる","CI Class Managerからアクセスできる"],a:1,e:"レガシーインスタンスでは重複排除タスクはDe-duplication Tasksモジュールからのみアクセスできた。CMDB Workspaceの導入により、重複排除タスクはワークスペースから直接表示および解決できるようになった。"},

L.push({c:"Course 4",l:"4-7",t:"重複の修復（Remediation of Duplicates）",
s:`重複CIの処理が重要な理由：①データの整合性と正確性（情報に基づいた意思決定のため）②IT運用の改善（インシデント・変更管理プロセスの混乱防止）③レポートとコンプライアンスの強化（正確なレポートと規制遵守）④より良い意思決定（信頼性の高いデータによる分析・予測）

主要な修復ツール：
1. 重複CIリメディエーター（Duplicate CI Remediator）：ウィザード形式のツール。管理者が潜在的な重複を確認し、保持するメインCIを選択し、重複から関連データをマージできる。コンプライアンスとトレーサビリティのための監査証跡を維持。重複排除プロセスの多くを自動化。
レガシー：De-duplication Tasksモジュールからアクセス / 新バージョン：CMDB Workspaceから直接表示・解決

2. 重複排除テンプレート（De-Duplication Templates）：事前構成された一貫した修復を重複排除タスクに一括でクラスごとに適用。CMDB Workspaceの重複排除ダッシュボードで作成・ライブラリ管理・テンプレート実行が可能。単一の操作で複数の重複排除タスクを修復できる。

重要な更新：重複を示すフィールドがDiscovery sourceフィールドからDuplicate ofフィールドに変更。理由：Discovery sourceフィールドの値を、レコードを更新した最後のDiscoveryソースで保持するため。

Now Assist for CMDB：生成AIの力をCMDB管理にもたらす。AI駆動の重複CI検出と修復提案を提供。管理者をステップバイステップの解決プロセスに導く。重複排除テンプレートを活用して単一の操作で複数の重複排除タスクを修復できる。

用語：Main CI（メインCI）＝重複マージ時に保持される正規のCIレコード / Duplicate Ofフィールド＝重複CIが参照する正規CIを示すフィールド / Merge（マージ）＝複数の重複CIのデータを1つのメインCIに統合するプロセス。`,

["重複処理の重要性②","レポートとコンプライアンスの強化：正確なレポートと規制遵守の実現","より良い意思決定：信頼性の高いデータによる分析・予測の質向上"],
["重複CIリメディエーター","ウィザード形式のツール。管理者が潜在的な重複を確認し、保持するメインCIを選択し、重複から関連データをマージできる","コンプライアンスとトレーサビリティのための監査証跡を維持。重複排除プロセスの多くを自動化する"],
["重複排除テンプレート","事前構成された一貫した修復を重複排除タスクに一括でクラスごとに適用できる","CMDB Workspaceの重複排除ダッシュボードで作成・ライブラリ管理・テンプレート実行が可能。単一の操作で複数タスクを修復できる"],

L.push({c:"Course 4",l:"4-8",t:"CIの再分類（CI Reclassification）",
s:`CI再分類（Reclassification）はCIがあるクラスから別のクラスに移動するプロセス。インポートまたは手動で入力されたCIデータが間違ったテーブルに格納される場合がある。ServiceNowにはこれを効果的に処理する機能がある。

デフォルトではCIは自動的に再分類される。自動再分類が無効な場合は再分類タスクが生成され手動レビュー・再分類が可能。

再分類のシナリオ例：管理者が300件のサーバーレコードをServer [cmdb_ci_server]テーブルに直接インポート → 2週間後にDiscoveryを実装 → DiscoveryがIREを通してCIを処理 → Server テーブルからWindows Server・Linux ServerテーブルへCIレコードが自動的にアップグレード・再分類される。

再分類の3タイプ：
・Upgrade（アップグレード）：CIをクラス階層内でより具体的な（下位の）子クラスに移動。例：Server [cmdb_ci_server] → Linux Server [cmdb_ci_linux_server]
・Downgrade（ダウングレード）：CIをクラス階層内でより一般的な（上位の）親クラスに移動。例：Linux Server [cmdb_ci_linux_server] → Server [cmdb_ci_server]
・Switch（スイッチ）：CIをクラス階層内で別のブランチのクラスに移動。例：Linux Server [cmdb_ci_linux_server] → Windows Server [cmdb_ci_win_server]

基本再分類システムプロパティ（すべてデフォルトtrue）：
・glide.class.upgrade.enabled：アップグレードの自動化を制御
・glide.class.downgrade.enabled：ダウングレードの自動化を制御
・glide.class.switch.enabled：スイッチの自動化を制御

重要：自動CI再分類が有効な場合（デフォルト）、CIクラスのダウングレードおよびスイッチ操作はデータ損失につながる可能性がある。

自動再分類が無効な場合：識別プロセス中に自動的に再分類されないCIに対して再分類タスクが作成される。割り当てられた管理者はタスクを確認してCIを特定し、再分類すべきかどうかを決定する必要がある。

追加の制御プロパティ：glide.identification_engine.update_without_switch_enabled / glide.identification_engine.update_without_downgrade_enabled / glide.identification_engine.update_without_upgrade_enabled`,

["Downgrade（ダウングレード）","CIをクラス階層内でより一般的な（上位の）親クラスに移動する","例：Linux Server [cmdb_ci_linux_server] → Server [cmdb_ci_server]。データ損失の可能性あり"],

{t:"基礎",q:"ダウングレードとスイッチに関する重要な注意点として正しいものはどれか？",o:["ダウングレードとスイッチはデータ損失の心配なく自由に実行できる","自動CI再分類が有効になっている場合、CIクラスのダウングレードおよびスイッチ操作はデータ損失につながる可能性がある","ダウングレードはデータ損失の可能性があるが、スイッチは安全","アップグレードはデータ損失の可能性があるが、ダウングレードは安全"],a:1,e:"重要な注意：自動CI再分類が有効になっている場合（デフォルト）、CIクラスのダウングレードおよびスイッチ操作はデータ損失につながる可能性がある。アップグレードはより具体的なクラスへの移動のためデータ損失のリスクは低い。"},
{t:"基礎",q:"自動再分類が無効の場合に発生することとして正しいものはどれか？",o:["CIが自動的に正しいクラスに移動する","識別プロセス中に自動的に再分類されないCIに対して再分類タスクが作成され、管理者が手動でレビュー・判断する必要がある","CMDBが全体的に停止する","CIが自動削除される"],a:1,e:"自動CI再分類が無効になっている場合、識別プロセス中に自動的に再分類されないCIに対して再分類タスクが作成される。割り当てられたServiceNow管理者はこれらのタスクを確認してCIを特定し、CIを再分類すべきかどうかを決定する必要がある。"},
{t:"基礎",q:"再分類を制御する基本システムプロパティとして正しいものはどれか？",o:["glide.cmdb.reclassification.enabled・glide.cmdb.downgrade.enabled","glide.class.upgrade.enabled・glide.class.downgrade.enabled・glide.class.switch.enabled","glide.identification_engine.reclassification・glide.cmdb.class.change","glide.required.attribute.enabled・glide.cmdb.enabled"],a:1,e:"再分類を制御する基本システムプロパティはglide.class.upgrade.enabled（アップグレードの自動化）・glide.class.downgrade.enabled（ダウングレードの自動化）・glide.class.switch.enabled（スイッチの自動化）の3つ。すべてデフォルトでtrueに設定されている。"},
{t:"引っ掛け",q:"CI再分類の典型的なシナリオとして正しいものはどれか？",o:["管理者が300件のサーバーレコードをServer テーブルにインポート後、Discoveryが実装されIREを通じてWindows Server・Linux ServerテーブルへCIが自動アップグレードされる","管理者が重複CIをマージするためにリメディエーターを使用する","孤立CIに関係性を追加するためのタスクが生成される","陳腐化したCIが自動的に削除される"],a:0,e:"典型的なシナリオ：管理者が300件のサーバーレコードをServer [cmdb_ci_server]テーブルに直接インポート → 2週間後にDiscoveryを実装 → DiscoveryがIREを通してCIを処理 → ServerテーブルからWindows Server・Linux ServerテーブルへCIレコードが自動的にアップグレード・再分類される。"},
{t:"試験対策",q:"再分類の3タイプとデータ損失リスクの組み合わせとして最も適切なものはどれか？",o:["すべてのタイプでデータ損失リスクがある","Upgrade（Server→Linux Server：データ損失リスク低） / Downgrade（Linux Server→Server：データ損失の可能性あり） / Switch（Linux Server→Windows Server：データ損失の可能性あり）","ダウングレードのみデータ損失リスクがある","アップグレードのみデータ損失リスクがある"],a:1,e:"再分類のリスク：Upgrade（より具体的な子クラスへ→データ損失リスク低）・Downgrade（より一般的な親クラスへ→データ損失の可能性あり）・Switch（別ブランチへ→データ損失の可能性あり）。ダウングレードとスイッチはデータ損失につながる可能性があるため注意が必要。"},

L.push({c:"Course 5",l:"5-1",t:"Data Manager（データマネージャー）",
s:`CMDB Data Manager は CI（構成アイテム）のエンドオブライフ操作と認証の一括管理のための policy-driven framework（ポリシー駆動型フレームワーク）である。

含まれるポリシー：
・Retire・Archive・Delete（エンドオブライフポリシー）
・Attestation（証明）
・Certification（認証）

時間の経過とともに大規模なCMDBは大量の古くなったCIを蓄積し全体的なパフォーマンスに悪影響を与える可能性がある。Data Manager は CIライフサイクル操作を自動化・管理するポリシーを作成・公開・管理する機能を提供し、CMDBが健全で効率的な運用状態を維持することを保証する。大規模なCMDBに対してスケーラブルであり、クラウドベース環境の急速な変化に適応可能。

【ユースケース】
・データアーカイブ（Data Archive）
・データ削除（Data Delete）
・定期的な証明と認証（Periodic Attestation and Certification）
・ライフサイクル管理（Lifecycle Management）：CIをアクティブから廃止ステータスへなどライフサイクルのさまざまなステージを通じてCIの移行を自動化

【レガシー Data Manager】
Configuration > CMDB Data Manager からアクセスできる。Yokohama リリースまでに非推奨（deprecated）となり、ユーザーは CMDB Workspace の新しい Data Manager を使用することが求められる。

【CMDB Workspace からアクセス可能な Data Manager（新しい Data Manager）】
CMDB Workspace を通じてアクセスでき UI Builder で設計されている。レガシー Data Manager で作成されたポリシーは新しい Data Manager と完全に互換性がある。CMDB Workspace バージョン 6.0.1 以降、Certification ポリシーをサポートするようになった。

【CMDB Data Manager を使用する前に】
CSDM標準に従い、CIは廃止の状態からアーカイブまたは削除へと進行する。CIはアーカイブまたは削除される前に、まず廃止されてエンドオブライフステージにある必要がある。

【Managed By Group の活用】
Data Manager ポリシータスクが正しく割り当てられるようにするには Managed By Group を活用することを推奨する。この属性値は ServiceNow Discovery や Service Mapping によって自動的に検出されない（non-discoverable data）。

【Data Manager のロール】
・data_manager_admin（管理者ロール）
・data_manager_user（ユーザーロール）`,

L.push({c:"Course 5",l:"5-2",t:"CMDB Query Builder（クエリビルダー）",
s:`CMDB Query Builder は、ユーザーが SQL コードを記述することなく複雑なデータベースクエリを視覚的に作成できるツールである。リレーションシップを持つ複数のテーブルにまたがるクエリを構築する際に特に役立つ。

【クエリタイプ（3種類）】
1. CMDB Query：CIクラスとリレーションシップ・参照についてインフラストラクチャをクエリする。オプションで非CMDBテーブルのコンテキストを追加可能。
2. Service Mapping Query：アプリケーションサービスをクエリする。パターンを定義してそのパターンを持つアプリケーションサービスマップをクエリする。
3. Combination Query：保存されたService MappingクエリをCMDBクエリに組み込むことで2つのクエリタイプを組み合わせる。

【インターフェース】
CIクラスをドラッグするキャンバスを提供し、CIクラス間にAND/OR操作を追加してクエリするリレーションシッププロパティを定義する。構築・保存したクエリを使用してCMDBグループにCIを入力し、グループ内のすべてのCIにまとめてアクションを適用できる。

【レポートのエクスポート】
クエリ結果ペインからリストコンテキストメニューを選択しExportを選択して希望するエクスポート形式（PDF等）を選ぶ。

【スケジュールクエリ】
定期的にスケジュールされた時間にクエリを実行するスケジュールクエリを作成できる。出力は電子メールで個人またはグループに送信され、クエリ結果は添付ファイルとして送られる（zip圧縮オプションあり）。

【クエリのインポート/エクスポート】
CMDB Query Builder の定義はエクスポートとインポートを使用してインスタンス間で移行できる（例：開発→テスト→本番）。

【システムプロパティ】
CMDB Query Builder の動作を制御するシステムプロパティは Configuration > CMDB Properties > Query Builder Properties からアクセスできる。`,

L.push({c:"Course 5",l:"5-3",t:"Unified Map（統合マップ）",
s:`Unified Map 機能は、選択したCI（ホームノード）を中心として、CI（構成アイテム）とそれらの間のリレーションシップの階層マップをグラフィカルに表示する。Dependency View と Application Service マップの多くの機能を単一のマップ体験に統合している。

CMDB Workspace の一部として含まれ、継続的に機能強化を受けている。

【有用な製品】
・Incident Management
・Problem Management
・Change Management
・Event Management

【主な機能要素（6つ）】
マップキャンバス・コンテンツコントロール・ツールボックス・コンテキストサイドパネル・ミニマップナビゲーター・タイムライン

【Unified Map の利点】
・CIがリレーションシップと参照によって他のCIにどのように接続されているかを視覚的に表示し、変更の影響を理解するのに役立つ
・アプリケーションサービスの構成も表示するため、Event Management や Incident Management などの製品で役立つ
・履歴の変更を確認し、CIを簡単にフィルタリングできる

【アクセス方法】
CMDB Workspace に移動 → Home ビューから Quick Links の下にある Unified Map を選択 → CI検索フィールドでマッピングされたアプリケーションサービスを検索

ノードバッジはインシデントまたは変更の存在を示す。`,

L.push({c:"Course 5",l:"5-4",t:"CMDB and CSDM Data Foundations Dashboards",
s:`CMDB and CSDM Data Foundations Dashboards は、CMDB と Common Service Data Model（CSDM）の主要な基盤指標に関する洞察を提供するダッシュボードを含む ServiceNow ストアアプリケーションである。

【CMDB Data Foundations Dashboard】
CMDB内のさまざまな構成とカスタマイズを評価しデータの品質と安定性を確保する。重要なデータが有効で適切に構成されていることを検証し、潜在的な実装リスクを特定し可視化する。ギャップを強調しリスク修復をガイドするプレイブックを提供。

【CSDM Data Foundations Dashboard】
フレームワークが適切に実装され価値を提供していることを確認するためにCSDMの主要な指標を評価する。

【インストールとアクセス】
System Applications > All Available Applications > All に移動 → CMDB and CSDM Data Foundations Dashboards ストアアプリケーションを検索してインストール。Configuration > CMDB Data Foundations Dashboard または CSDM Data Foundations Dashboard に移動。または CMDB Workspace の Management タブからアクセス。

【スケジュールジョブ】
インストール後、最初はデータが表示されない。スケジュールジョブが自動実行されるまで待つか、System Definition > Scheduled Jobs で「Get Well」を含むジョブを検索してExecute Nowを選択して手動実行。

【修復プレイブック】
各プレイブックは指標の概要・問題の概要・対処の重要性・スコアの修正/改善方法を提供する。

【Data Foundations Dashboards と CMDB Health Dashboard の違い】
・Data Foundations Dashboards：構成不可。固定メトリクスでカスタマイズ不可
・CMDB Health Dashboard：表示・除外したいデータのタイプに完全な柔軟性を提供

Data Foundation DashboardメトリクスはServiceNow Health Scan Definitionsのサブセットである。ダッシュボード上部セクション：コンプライアンス準拠CIのパーセンテージとして表示。下部セクション：非コンプライアンスCIのタイル。`,

s:`Intelligent Search は、CMDB管理者とユーザーがCMDBで自然言語クエリ（NLQ: Natural Language Query）を実行できるようにし、複雑なCMDBデータモデルに精通する必要をなくす。CMDB Query Builder の使用方法を知らなくても複雑なマルチテーブルクエリを実行できる。

【主な機能】
・平易な言葉で検索クエリを入力すると、テーブル名・部分フレーズ・過去の検索用語を含む動的な提案を受け取る
・事前設定されたサンプル検索がすぐに使用できる状態で利用可能
・最新の5件の検索にアクセスでき、各個人向けにパーソナライズされている

【Intelligent Search と CMDB Query Builder の統合】
システムプロパティ glide.cmdb.query.nlq.activated によって管理され、デフォルトで有効。CMDBクエリが複数のテーブルを含む場合「View in Query Builder」ボタンが表示される。選択すると CMDB Query Builder が開き、クエリがキャンバス上に完全に構築される。

【サンプル検索】
CMDB管理者（sn_cmdb_admin ユーザーロール）は NLQ Sample Search テーブルのレコードを直接編集することでサンプル検索を変更できる。

・サンプル検索は NLQ Sample Search [sn_cmdb_ws_nlq_sample_search] テーブルに保存
・参照されるテーブルは NLQ Sample Search Table [sn_cmdb_ws_nlq_sample_search_table] テーブルに保存
・サンプル検索への変更は CMDB Workspace と CMDB Query Builder の両方に反映される`,

L.push({c:"Course 5",l:"5-6",t:"Product Views（製品ビュー）",
s:`健全で成熟し、適切にメンテナンスされたCMDBは、ServiceNow AIプラットフォームでの成功の重要なコンポーネントであり、ITサービスマネジメントやその他多くのエンタープライズプロセスにとって価値ある意思決定支援ツールである。

【健全なCMDBとServiceNow ITSMの効果】
・インシデント解決が38%高速化
・失敗した変更が82%減少
・問題管理で解決されたインシデントが604%増加
・適切に構成されたCMDBによりITコストを最大40%削減

【Incident Management】
CMDBからの情報をインシデントの回復やサービスとインフラストラクチャCIのステータス通知に活用する。CI属性の入力によりAssignment Group（Support Group）などのルーティング詳細を決定する。Impacted Services関連リストにServicesとService Offeringsを表示。

【Change Management】
CMDBに保存された情報を使用して変更要求（RFC）を評価・承認する。CI間のリレーションシップでビジネスアプリケーションとサービスへの影響分析を提供する。

【Event Management】
サードパーティの監視ツールからインフラストラクチャイベントのアラートを収集する。DiscoveryによってIT関連情報を収集し、アラートをCIにマッピングする。イベント相関・自動応答の機能を提供。

【Asset Management】
CMDBを入力する際、ハードウェア資産についてCI対資産の同期が発生する。SAMはCMDBに保存されたデータに基づいてソフトウェアライセンスの使用を最適化する。コスト管理（過小利用資産の特定）・ライフサイクル管理（耐用年数終了・ライセンス期限を自動フラグ）。

内部ユーザーがデータ正確性への信頼を失うと独自のデータソースを使用しServiceNowの有効性が損なわれる。一般的な問題：重複したCI・古いCI・不完全なCI。`,

{t:"基礎",q:"CMDBヘルスダッシュボードジョブへのナビゲーションパスとして正しいものはどれか？",o:["System Definition > Scheduled Jobs > CMDB Health","Configuration > Health Preferences > Scheduled Jobs","CMDB Workspace > Settings > Jobs","CI Class Manager > Health > Scheduled Jobs"],a:1,e:"CMDBヘルスダッシュボードジョブへのアクセス：Configuration > Health Preferences > Scheduled Jobs。ここで各スコア計算ジョブを開いてActivateし、Execute Nowで手動実行できる。"},
{t:"基礎",q:"ジョブ実行後にメトリクスの完了状態を確認するために移動すべきテーブルはどれか？",o:["cmdb_ci.list","sys_trigger.list","cmdb_health_metric_status.list","cmdb_health_rule.list"],a:2,e:"ジョブ実行後の確認先はcmdb_health_metric_status.list。ここで9つのメトリクスのステータスが「complete（完了）」であることを確認する。"},
{t:"基礎",q:"シナリオ1の検証でcmdb_health_metric_status.listに表示されるべき完了ステータスのメトリクス数として正しいものはどれか？",o:["3つ","6つ","9つ","12つ"],a:2,e:"検証条件：「9つのメトリクスが完了（complete）ステータスで表示されていること」。3スコアカード（完全性・コンプライアンス・正確性）それぞれに複数のメトリクスが含まれ合計9つになる。"},
{t:"基礎",q:"CMDBヘルスダッシュボードの結果を確認するナビゲーションパスとして正しいものはどれか？",o:["Configuration > CMDB Health Dashboard","System Definition > CMDB Metrics","CMDB Workspace > Management > CMDB Health","CI Class Manager > Health > Scores"],a:2,e:"CMDBヘルスダッシュボードへのアクセス：CMDB Workspace > Management（管理）> CMDB Health（CMDBヘルス）。ここで各メトリクスのヘルススコアが表示されていることを確認する。"},
{t:"基礎",q:"完全性（Completeness）および正確性（Correctness）スコアカードに含まれるCIの範囲として正しいものはどれか？",o:["1.5K","2.5K","3.01K","5.0K"],a:2,e:"要件に「The scope of CIs that are part of the Completeness and Correctness scorecards should be 3.01K」と明記されている。"},
{t:"重要注記",q:"「The Compliance metric value may differ from what is displayed including the overall health score.」が意味することとして正しいものはどれか？",o:["Complianceジョブは実行しなくてよい","Complianceメトリクスの値は他のスコアカードと異なる場合があり全体的なヘルススコアも異なる可能性がある。これは想定内の動作","Complianceスコアは常に0%で表示される","Complianceスコアが異なる場合はジョブを再実行する必要がある"],a:1,e:"Complianceメトリクスの値が他と異なることは想定内の動作。Certification FilterやAudit設定によって生じる。他の検証条件（9メトリクス完了・3.01K）が満たされていれば問題ない。"},
{t:"試験対策",q:"シナリオ1でCMDB管理者が行うべき正しい手順の順序はどれか？",o:["cmdb_health_metric_status.listで確認→ジョブを有効化→Execute Now","Configuration > Health Preferences > Scheduled Jobsで各ジョブをActivate→Execute Now→ジョブ完了まで待機→cmdb_health_metric_status.listで9メトリクス完了確認→CMDB Workspace > Management > CMDB Healthで結果確認","CMDB Workspaceでスコア確認→ジョブを有効化→Execute Now","Completeness・Correctnessのみ実行しComplianceは省略する"],a:1,e:"正しい手順：①Configuration > Health Preferences > Scheduled Jobsで各ジョブをActivate②Execute Now③ジョブ完了まで待機④cmdb_health_metric_status.listで9メトリクス完了確認⑤CMDB Workspace > Management > CMDB Healthで確認⑥Completeness・Correctnessの範囲が3.01Kであることを確認"}
]});
L.push({c:"Course 6",l:"6-2",t:"Create CMDB Group",
s:`Create CMDB Group`,
p:[],
q:[
{t:"基礎",q:"シナリオ2でCMDB Groupを作成する際のタイプ（Type）として正しいものはどれか？",o:["CI Class","Discovery","Health","Compliance"],a:2,e:"CMDB Groupを作成する際、タイプは「Health」を選択する必要がある。タイプを間違えると失敗フィードバック「Is it of type 'Health'?」に対応するエラーとなる。"},
{t:"基礎",q:"シナリオ2でCMDB Groupのグループ名として正しいものはどれか？",o:["Unix and Windows","Windows and Unix Servers","Unix and Windows Servers","Unix Windows Servers Group"],a:2,e:"グループ名は「Unix and Windows Servers」と完全一致（EXACTLY）で入力する必要がある。失敗フィードバック「Did you name the new group EXACTLY as described in the instructions?」に対応する。"},
{t:"基礎",q:"シナリオ2でCMDB Groupに含める対象クラスとして正しいものはどれか？",o:["Windows Server・Linux Server・Unix Serverの3クラス","AIX Server・HPUX Server・Solaris Server・Windows Serverの4クラス","Windows Server・Solaris Serverの2クラス","すべてのServerクラス"],a:1,e:"対象クラスはUNIX Server系（AIX Server・HPUX Server・Solaris Server）とWindows Serverの合計4クラス。Encoded Query（エンコードクエリ）と条件で設定する。"},
{t:"基礎",q:"シナリオ2でCMDB Groupを作成後にShow All CIボタンを押して確認すべき件数として正しいものはどれか？",o:["100件","123件","146件","200件"],a:2,e:"Hint：「Show All CIボタンを選択し、Load More Resultsボタンを選択し、146のWindows・Unix・Solaris・AIXサーバーが返されることを確認してから続行する」。146件が正しい件数。"},
{t:"基礎",q:"シナリオ2でCMDB Groupを作成後にスケジュールジョブを実行するナビゲーションパスとして正しいものはどれか？",o:["Configuration > Health Preferences > Scheduled Jobs","CMDB Workspace > Management > CMDB Health > CMDB Health settings","CI Class Manager > Health > Jobs","System Definition > Scheduled Jobs"],a:1,e:"シナリオ2の要件：「CMDB Workspace > Management > CMDB Health > CMDB Health settingsから、Completeness・Compliance・CorrectnessのScheduled Jobsを実行する」"},
{t:"検証",q:"シナリオ2の検証条件として正しいものはどれか？",o:["Unix and Windows Servers HealthグループのCMDB Health Dashboardにスコアが表示される。スコープはCompliance以外は146件","CMDB Health GroupにUnix and Windows Serversが存在し、全体的なCompleteness・Compliance・CorrectnessスコアなどのメトリクスとともにCMDB Health Groupが確認できる。スコープは146件（Complianceは変動あり）","スコープが200件のメトリクスが表示される","Completenessスコアのみが表示される"],a:1,e:"検証条件：「Unix and Windows Servers HealthグループにCompleteness・Compliance・Correctnessスコアを含むメトリクスが表示されること。スコープは146件（Complianceメトリクスは変動する可能性あり）」"},
{t:"試験対策",q:"CMDB Groupでエンコードクエリ（Encoded Query）を使用する理由として最も適切なものはどれか？",o:["グループに単一クラスのみを追加するため","複数の異なるクラス（AIX・HPUX・Solaris・Windows）を条件と組み合わせて一つのグループにまとめるため","Discovery Scheduleを設定するため","Health Inclusion Rulesを置き換えるため"],a:1,e:"Encoded Queryは複数の異なるCIクラスを条件と組み合わせて一つのCMDB Groupにまとめる際に使用する。シナリオ2ではAIX・HPUX・Solaris・Windows Serverの4クラスを組み合わせるために必要。"},
{t:"基礎",q:"シナリオ2でCMDB Groupを作成する際にNavigateすべき場所として正しいものはどれか？",o:["CI Class Manager > CMDB Groups","CMDB Workspace > Management > CMDB Groups または Configuration > CMDB Health > CMDB Groups","System Properties > CMDB Groups","Health Preferences > Groups"],a:1,e:"CMDB Groupの作成はCMDB Workspace > Management > CMDB Groups または Configuration > CMDB Health > CMDB Groupsからアクセスして新規グループを作成する。"},
{t:"引っ掛け",q:"CMDB Groupを使用する際のBestPractice（ベストプラクティス）として最も適切なものはどれか？",o:["すべてのCIをひとつのグループにまとめる","組織が管理責任を持つCIクラスのみをグループに含め、Health Inclusion Rulesと組み合わせてスコアカードの評価範囲を意味あるメトリクスに絞り込む","グループは必要最小限の1つのみ作成する","CMDB Groupは作成せずHealth Inclusion Rulesのみを使用する"],a:1,e:"CMDB Groupを使用すると複数クラスを統合したビューを提供でき、組織が管理責任を持つCIクラスのみに絞り込んだ意味のあるメトリクスを確認できる。シナリオ2でもUnix・Windows Serverという管理対象クラスのみをグループ化している。"}
]});

{t:"基礎",q:"シナリオ3でCMDBヘルスダッシュボードジョブを1日2回実行するスケジュール設定として正しいものはどれか？",o:["毎日1回午前9時に実行","毎日午前7時と午後7時の2回実行","毎週月曜日と木曜日に実行","毎時間実行"],a:1,e:"要件：「本日を開始日として、午前7時と午後7時の1日2回実行するように設定する」。3つのジョブ（Completeness・Compliance・Correctness）すべてに同じスケジュールを設定する。"},
{t:"基礎",q:"シナリオ3で設定するジョブの実行頻度として正しいものはどれか？",o:["1日1回","1日2回（午前7時と午後7時）","1週間に2回","1時間ごと"],a:1,e:"要件：「activate and configure the following CMDB Health Dashboard jobs to execute two times a day at 7am and 7pm starting today」。1日2回・午前7時と午後7時・本日開始が正しい設定。"},
{t:"基礎",q:"シナリオ3の検証で各CMDBヘルスダッシュボードジョブを開いて確認すべき内容として正しいものはどれか？",o:["ジョブがActiveであることのみ確認する","ジョブが1日2回・午前7時と午後7時に実行するように設定されていることを確認する","ジョブの実行結果のログを確認する","cmdb_health_metric_status.listで9メトリクスを確認する"],a:1,e:"検証条件：「Open each of the CMDB Health Dashboard scheduled jobs and verify they will execute two times a day at 7am and 7pm starting today」。各ジョブを開いてスケジュール設定を確認する。"},
{t:"試験対策",q:"シナリオ3でステークホルダーが「ヘルスダッシュボードを1日2回更新したい」と決定した理由として最も適切なものはどれか？",o:["ジョブの実行が遅いため複数回実行が必要だから","グループヘルスダッシュボードのメトリクスは最後に実行されたジョブのデータしか反映されないため、より頻繁に更新することでデータの鮮度を保つため","コンプライアンス要件で1日2回の実行が義務付けられているから","ServiceNowの推奨設定が1日2回だから"],a:1,e:"シナリオ：「Cloud Dimensions understands the metrics on the Group Health Dashboard are only as current as the last executed job.」グループヘルスダッシュボードのメトリクスは最後に実行されたジョブの時点のデータのみ反映されるため、より頻繁な実行でデータの鮮度を保つ。"}

{t:"基礎",q:"シナリオ4で推奨フィールドを設定する際のナビゲーションとして正しいものはどれか？",o:["Configuration > CMDB Properties > Recommended Fields","CI Class Manager で Server クラスを選択し推奨フィールドを設定する","CMDB Workspace > Management > Recommended Fields","System Properties > CMDB > Recommended Fields"],a:1,e:"推奨フィールドの設定方法：CI Class Manager > Hierarchy > クラス（Server）を検索 > Health > Completeness > Recommended Fieldsタブ > フィールドを右側に移動。"},

{t:"基礎",q:"シナリオ5でCertification Template（認証テンプレート）に含めるOSバージョンとして正しいものはどれか？",o:["Windows 2008・Windows 2012・Windows 2016","Windows 2012 R2 Standard・Windows 2016 Standard・Windows 2019 Datacenter","Windows 2016 Standard・Windows 2019 Datacenter・Windows 2022","Windows 2012 R2・Windows 2016・Windows 2019・Windows 2022の4つ"],a:1,e:"Certification Template要件：「certification attribute conditions for Operating Systems that are Windows 2012 R2 Standard, Windows 2016 Standard, Windows 2019 Datacenter」の3つのOSを含む。"},
{t:"基礎",q:"シナリオ5でDesired State監査がパスすべきWindowsサーバーの条件として正しいものはどれか？",o:["すべてのWindowsサーバーがパスする","Windows 2012 R2 Standard・Windows 2016 Standard・Windows 2019 Datacenterを実行しているサーバーのみがパスし、それ以外はすべて失敗する","Windows 2019 Datacenterのみがパスする","Windows 2012 R2 Standardのみが失敗する"],a:1,e:"検証条件：「Windows Servers that are Windows 2012 R2 Standard, Windows 2016 Standard, and Windows 2019 Datacenter should pass the audit. All other Windows Servers should fail the audit.」"},

{t:"基礎",q:"シナリオ6でベースシステムの監査（Base System Audits）をどうすべきか？",o:["すべて削除する","Compliance > Desired State > Auditsでアクティブなすべてのベースシステム監査を非アクティブ（Active=false）にする（自分が作成した1つの監査のみアクティブに保つ）","すべてそのまま残す","設定変更は不要"],a:1,e:"要件：「Deactivate (mark as active-false) ALL base system audits that are shown as active from Compliance > Desired State > Audits. NOTE: Keep the 1 audit you created as active.」自作の1つのみアクティブにする。"},
{t:"検証",q:"シナリオ6の検証結果として正しいものはどれか？",o:["146件のWindows Serverすべてが監査に合格","54件の123件中のWindowsサーバーが監査に失敗し（44%が失敗）、Complianceスコアは56%となる","100%のWindowsサーバーが監査に合格","123件のWindows Serverすべてが監査に失敗"],a:1,e:"検証条件：「54 of 123 Windows Servers or 44% failed the audit resulting in a Compliance score of 56%」。なお、シナリオ9（Remediate Duplicates）を先に実施した場合は54/122と表示される。"},

{t:"検証",q:"シナリオ3の検証で確認すべき内容として正しいものはどれか？",o:["ApplicationsモジュールにMongoose Web Serverが2つ作成されている","①ApplicationsモジュールにCMDB内にMongoose Web Serverが1つだけ作成されていること②OWA-SD-01という名前のサーバーのDependency viewマップでMongoose WebServerとRuns on:Runsの関係があること","Mongoose Web Serverの関係が削除されている","Mongoose Web ServerのDiscovery Sourceが表示されている"],a:1,e:"検証条件：①Applicationsモジュールで1つだけのMongoose Web Serverが作成されていること（スクリプトを2回実行しても1つのみ）②OWA-SD-01のDependency viewマップでMongoose Web ServerとRuns on:Runsの関係があること"},
{t:"試験対策",q:"シナリオ3でスクリプトを2回実行しても重複が作成されない理由として正しいものはどれか？",o:["スクリプトが2回目は自動的に無効になるから","Identification Ruleが実行中のプロセスコマンド（Running process command）でCMDB内の既存のMongoose Web Serverと一致を検出し、同一CIとして認識するため重複を作成しない","CMDBの容量制限により2つ目が作成されないから","ServiceNowが重複を自動削除するから"],a:1,e:"Identification RuleはRunning process commandを識別子エントリとして使用する。2回目のスクリプト実行時に同じRunning process commandで既存のMongoose Web Serverと一致するため、重複を作成せず既存のCIを更新する（またはスキップする）。"}
]});
L.push({c:"Course 7",l:"7-4",t:"バージョンアップグレードのIdentification Ruleをテストする",
s:`バージョンアップグレードのIdentification Ruleをテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ4でバージョンアップグレードのテストを実行する際、スクリプトの変更内容として正しいものはどれか？",o:["Discovery Sourceの値をLANDeskに変更する","以前のスクリプトのバージョン番号を6.5に変更して実行する","スクリプトのテーブル名を変更する","スクリプトのサーバー名をOWA-SD-02に変更する"],a:1,e:"要件：「Scripts - Backgroundから、提供された以前のスクリプトをRun scriptフィールドに貼り付け、バージョンを6.5に変更して実行します」。バージョン番号のみを変更してスクリプトを再実行する。"},
{t:"検証",q:"シナリオ4の検証で確認すべき内容として正しいものはどれか？",o:["Mongoose Web Serverが2つ表示される","①Applicationsモジュールでバージョン6.5のMongoose Web Serverが1つだけ表示されること（重複なし）②OWA-SD-01のWindowsサーバーのみがMongoose Web Serverと単一のRuns on:Runs関係を持ち重複する関係がないこと","Mongoose Web Serverが削除されている","バージョン5.5のMongoose Web Serverが残っている"],a:1,e:"検証条件：①バージョン6.5のMongoose Web Serverが1つだけ（重複なし）②OWA-SD-01のWindows ServerとMongoose Web Serverの単一のRuns on:Runs関係（重複関係なし）。Identification RuleがRunning process commandで一致を検出しバージョンを更新したため。"},
{t:"試験対策",q:"シナリオ4でバージョンアップグレード後も重複が作成されない理由として正しいものはどれか？",o:["バージョン番号が識別子として使用されているから","Identification RuleはRunning process commandで一致を検出する。バージョンが変わっても同じRunning process commandで既存のMongoose Web Serverと一致するため、新規作成ではなくバージョン属性を更新する","スクリプトが古いレコードを自動削除するから","CMDBが同一テーブルへの重複挿入を禁止しているから"],a:1,e:"注記：「Mongoose Web Serverアプリケーションは、スクリプトによってServiceNowに統合されると、実行中のプロセスコマンドに基づいて照合され、アプリケーションのバージョンが更新され、重複は作成されません」。Running process commandが識別子であるためバージョン変更は重複を生まない。"}
]});
L.push({c:"Course 7",l:"7-5",t:"同じホストに展開された2番目のMongooseアプリのIdentification Ruleをテストする",
s:`同じホストに展開された2番目のMongooseアプリのIdentification Ruleをテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ5で2番目のMongoose Web Serverが作成される理由として正しいものはどれか？",o:["スクリプトが強制的に新規レコードを作成するから","2番目のMongoose Web Serverの実行プロセスコマンドが「d:\\\\clouddimensions\\\\mongoose.exe」と異なるため、Identification Ruleが既存のMongoose Web Serverと一致を見つけられず新規CIとして作成する","サーバー名が異なるから","バージョンが異なるから"],a:1,e:"注記：「実行中のプロセスコマンドで一致するものを見つけられなかったため、Identification Ruleにより、2番目のMongoose Web Serverが作成されます」。Running process commandが異なるディレクトリ（d:\\\\clouddimensions\\\\mongoose.exe）のため既存CIと一致せず新規作成される。"},
{t:"検証",q:"シナリオ5の検証で確認すべき内容として正しいものはどれか？",o:["Applicationsモジュールに1つのMongoose Web Serverのみ表示される","①Applicationsモジュールに2つのMongoose Web Serverアプリケーションが表示されること②OWA-SD-01のDependency viewマップでWindows ServerとRuns on:Runs関係で表示されている2つのMongoose Web Serverアプリケーションがあること","Mongoose Web ServerのすべてのバージョンがRuns on:Runs関係を持つ","Dependency viewにMongoose Web Serverが表示されない"],a:1,e:"検証条件：①Applicationsモジュールに2つのMongoose Web Serverが表示される②OWA-SD-01のDependency viewマップで2つのMongoose Web ServerがWindows ServerとRuns on:Runs関係で表示される。同一ホスト上の異なるディレクトリへの2番目のデプロイが別CIとして作成された。"},
{t:"試験対策",q:"シナリオ3・4・5のテスト結果からIdentification RuleのRunning process commandを識別子として使用することの特性として正しいものはどれか？",o:["同じホスト上のすべてのMongoose Web Serverを常に1つのCIに統合する","同じRunning process commandは同一CIとして認識（更新）し、異なるRunning process commandは別のCIとして新規作成する。これにより同一サーバー上の異なるディレクトリへのデプロイを個別のCIとして管理できる","バージョンが同じ場合のみ同一CIとして認識する","ホスト名が同じ場合のみ同一CIとして認識する"],a:1,e:"シナリオ3・4・5の結果：同じRunning process command→既存CI更新（重複なし）。異なるRunning process command（異なるディレクトリ）→新規CI作成。つまりRunning process commandで個々のアプリケーションインスタンスを一意に識別できる。"}
]});
L.push({c:"Course 7",l:"7-6",t:"2番目のDiscovery Sourceからの統合をテストする",
s:`2番目のDiscovery Sourceからの統合をテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ6でLANDeskとServiceNowという2つのDiscovery Sourceから同じWindowsサーバーを更新する際、重複レコードが作成されない条件として正しいものはどれか？",o:["両方のDiscovery Sourceが同じRAM値を収集する必要がある","両方のDiscovery Sourceが同じ共通の値（例：Name）を収集し、この属性がIdentification Ruleの識別子エントリとして設定されている必要がある","両方のDiscovery Sourceが同時に実行される必要がある","両方のDiscovery Sourceが同じMID Serverを使用する必要がある"],a:1,e:"注記：「各Discovery sourceがシリアル番号や名前など、両方のDiscovery sourceで同じ共通の値を収集し、この属性がIdentification Ruleの識別子エントリとして設定されなければならない」。共通の識別子で同一CIと認識し重複を防ぐ。"},
{t:"基礎",q:"シナリオ6でスクリプトで設定するRAM値とDiscovery Sourceとして正しいものはどれか？",o:["RAM: 2048 / Discovery Source: ServiceNow","RAM: 4096 / Discovery Source: LANDesk","RAM: 4096 / Discovery Source: ServiceNow","RAM: 2048 / Discovery Source: LANDesk"],a:1,e:"要件：「Windows Server RAM: 4096 / Discovery Source: LANDesk」。LANDeskは4096、ServiceNowは2048を収集し、2つのDiscovery Sourceを区別する。"},
{t:"検証",q:"シナリオ6の検証でShow XML機能を使用して確認すべき内容として正しいものはどれか？",o:["RAM値が2048でDiscovery SourceがServiceNowであること","RAM値が4096でDiscovery SourceがLANDeskであること","RAM値が0でDiscovery Sourceが空であること","RAM値が8192でDiscovery SourceがLANDeskであること"],a:1,e:"検証条件：「Show XML（XML表示）でRAM値が4096で、Discovery SourceがLANDeskであることを確認する」。LANDeskから収集されたRAM値4096でCIが更新されている。"},
{t:"試験対策",q:"シナリオ6でShow XML（XML表示）機能の説明として正しいものはどれか？",o:["CMDBをXML形式でエクスポートする機能","管理者がフォームに表示されない場合でも、レコードとそのすべてのフィールドと値を表示できる便利な機能。ヘッダーを右クリックして選択する","XMLをインポートする機能","ServiceNow APIのドキュメントを表示する機能"],a:1,e:"注記：「Show XML（XML表示）は、フォームに表示されない場合でも、管理者がレコードとそのすべてのフィールドと値を表示するための便利なオプションです」。ヘッダーを右クリック→Show XML（XML表示）を選択してアクセスする。"}
]});

s:`Multisource CMDBを有効化する`,

{t:"基礎",q:"シナリオ7でMultisource CMDB（マルチソースCMDB）を有効化するために必要な2つの手順として正しいものはどれか？",o:["CI Class Managerで設定を変更する","①適切なシステムプロパティ（glide.identification_engine.multisource_enabled）をtrueに設定する②ITOM Discovery License（com.snc.itom.vis.license）プラグインをインストールする","CMDB Health Dashboardから有効化する","Discovery Scheduleを作成する"],a:1,e:"Multisource CMDBの有効化には①システムプロパティ：glide.identification_engine.multisource_enabledをtrueに設定②プラグイン：ITOM Discovery License（com.snc.itom.vis.license）をインストールの2つが必要。"},
{t:"試験対策",q:"Multisource CMDB（CMDB 360）を有効化することの主なメリットとして正しいものはどれか？",o:["CMDBのパフォーマンスが向上する","CI属性の更新に関与したすべてのDiscovery Sourceと提案された値の完全な履歴を保持できる。Track（追跡）・Revert（元に戻す）・Recompute（再計算）の3つの利点を提供する","重複CIを自動的に削除する","陳腐化ルールを自動設定する"],a:1,e:"Multisource CMDB（CMDB 360）の3つの利点：①Track：様々なDiscovery SourceがCIをどのようにpopulateしているかを追跡②Revert：特定のDiscovery SourceからのCI更新を元に戻す③Recompute：更新されたReconciliation Rulesを使用して属性値を再計算する"}
]});

s:`Multisource CMDBデータを検証する`,

{t:"基礎",q:"シナリオ8でMultisource CMDBデータを確認するテーブルとして正しいものはどれか？",o:["cmdb_ci.list","cmdb_multisource_data（CMDB 360 Data）テーブル","cmdb_health_metric_status.list","cmdb_datasource_last_update.list"],a:1,e:"検証条件：「Windows Server OWA-SD-01のCMDB 360 Data [cmdb_multisource_data]テーブルから、Discovery SourceであるServiceNowとLANDeskの両方にデータが存在することを確認する」。"},
{t:"基礎",q:"シナリオ8でOWA-SD-01のWindowsサーバーレコードからCMDB 360データを確認する方法として原文に記載されているものはどれか？",o:["CMDBヘルスダッシュボードから確認する","Related LinksのCMDB 360 Data Preview UIアクションボタンをクリックしてRAMフィールドを検索する、またはCMDB 360 Data関連リストを追加してRAMを表すCol 36を確認する","CI Class Managerから確認する","Show XML（XML表示）から確認する"],a:1,e:"検証方法：①Related LinksのCMDB 360 Data Preview UIアクションボタンをクリックしRAMフィールドを検索②またはCMDB 360 Data関連リストを追加してRAMを表すCol 36を追加して確認。"},
{t:"試験対策",q:"Multisource CMDBを有効化した後のデータ収集の特性として正しいものはどれか？",o:["最後に更新したDiscovery Sourceのデータのみ保存される","CMDB内のCIを作成および更新するすべてのDiscovery Sourceからのデータがキャプチャされ保存される。これにより選択されなかった低優先度のDiscovery Sourceの値も保持される","データは7日間のみ保持される","管理者が手動でデータを入力する必要がある"],a:1,e:"注記：「Multisource CMDBを有効にすると、CMDB内のCIを作成および更新するすべてのDiscovery SourceからのデータがCMDB MultiSource Data [cmdb_multisource_data]テーブルにキャプチャされます」。低優先度ソースのデータも保持される。"}
]});
L.push({c:"Course 7",l:"7-9",t:"Reconciliation Rule（調整ルール）",
s:`Reconciliation Rule（調整ルール）`,
p:[],
q:[
{t:"基礎",q:"シナリオ9でStatic Reconciliation Rule（静的調整ルール）を設定するクラスとして正しいものはどれか？",o:["Server（cmdb_ci_server）クラス","Windows Server（cmdb_ci_win_server）クラス","Email Serverクラス","Configuration Item（cmdb_ci）ベースクラス"],a:1,e:"要件：「CI Class Managerを使用し、Windows Server (cmdb_ci_win_server) クラスをStatic Reconciliation Ruleで更新する必要があります」。Windows Serverクラスに静的調整ルールを設定する。"},
{t:"基礎",q:"シナリオ9のStatic Reconciliation Ruleの要件として正しいものはどれか？",o:["LANDeskとServiceNowが互いに更新可能","Discovery Source LANDeskのCMDB内のWindows ServerレコードはDiscovery Source ServiceNowによって更新できる。ただしDiscovery Source ServiceNowのWindows ServerレコードはDiscovery Source LANDeskによって更新できない","ServiceNowのみが更新可能でLANDeskは更新不可","LANDeskのみが更新可能でServiceNowは更新不可"],a:1,e:"要件：「Discovery Source LANDeskのCMDB内のWindows ServerレコードはDiscovery Source ServiceNowによって更新できる」かつ「Discovery Source ServiceNowのCMDB内のWindows ServerレコードはDiscovery Source LANDeskによって更新できない」。ServiceNowが高優先度。"},
{t:"試験対策",q:"Reconciliation Rule（調整ルール）でorder value（オーダー値）と優先度の関係として正しいものはどれか？",o:["order valueが高いほど優先度が高い","order valueが低いほど優先度が高い。例：ServiceNowがorder value最低＝最高優先度を持ち、更新後はLANDeskは同じレコードを更新できない","order valueは優先度に関係ない","すべてのDiscovery Sourceが同じ優先度を持つ"],a:1,e:"Reconciliation RuleではOrder value（オーダー値）が低いほどPriority（優先度）が高い。ServiceNowがorder value最低＝最高優先度を持つ。これによりServiceNowが更新したレコードはLANDeskによる上書きが防がれる。"}
]});
L.push({c:"Course 7",l:"7-10",t:"ServiceNowのReconciliation Ruleをテストする",
s:`ServiceNowのReconciliation Ruleをテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ10でServiceNowからのデータがLANDeskによって最後に更新されたレコードを更新できることを検証する手順として正しいものはどれか？",o:["CMDBヘルスダッシュボードで確認する","Scripts - BackgroundでスクリプトをRun scriptフィールドに貼り付けて実行し、その後Windows Serverモジュールでスクリプト実行前後のRAMとDiscovery Sourceを確認する","CI Class Managerから直接実行する","Discovery Scheduleを実行する"],a:1,e:"要件：「System Definition > Scripts - Backgroundからスクリプトを実行する」。検証：OWA-SD-01のRAMが2048でDiscovery SourceがServiceNowに更新されたことを確認する。"},
{t:"検証",q:"シナリオ10の検証でOWA-SD-01のWindowsサーバーに表示されるべきRAM値とDiscovery Sourceとして正しいものはどれか？",o:["RAM: 4096 / Discovery Source: LANDesk","RAM: 2048 / Discovery Source: ServiceNow","RAM: 2048 / Discovery Source: LANDesk","RAM: 4096 / Discovery Source: ServiceNow"],a:1,e:"検証条件：「Windows Serverモジュールで、OWA-SD-01という名前のサーバーのRAMが2048で、Discovery SourceがServiceNowであることを確認する」。ServiceNowのReconciliation Ruleが機能し、LANDeskで最後に更新されたレコードをServiceNowが更新できた。"}
]});
L.push({c:"Course 7",l:"7-11",t:"LANDeskの調整をテストする",
s:`LANDeskの調整をテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ11でLANDeskのデータがServiceNowによって最後に更新されたレコードを更新できないことを検証する内容として正しいものはどれか？",o:["OWA-SD-01のRAMが4096に変更されている","OWA-SD-01のRAMが4096ではなく2048のままであること（LANDeskによる更新が阻止された）、およびcmdb_datasource_last_update.listでRAMフィールドがServiceNowによって最後に更新されたことを確認する","OWA-SD-01が削除されている","OWA-SD-01のDiscovery SourceがLANDeskに変更されている"],a:1,e:"検証条件：「OWA-SD-01という名前のサーバーが更新されておらず、RAMが4096ではなく2048のままであること」。また「cmdb_datasource_last_update.listでRAMフィールドがServiceNowによって最後に更新されたことを確認する」。"},
{t:"引っ掛け",q:"シナリオ11の検証で、LANDeskがレコードを更新できなかったにもかかわらずDiscovery Sourceフィールドがどのように変更されるか？",o:["Discovery SourceはServiceNowのまま変わらない","Discovery SourceフィールドはLANDeskに更新される。これはLANDeskがレコードを更新する許可された最後のソースであったものの、Reconciliation Ruleにより許可されなかったことを反映している","Discovery Sourceフィールドは空になる","Discovery SourceフィールドはServiceNow+LANDeskと表示される"],a:1,e:"注記：「Windows Server レコードでRAMが更新されていなくても、Discovery SourceフィールドはLANDeskに更新されます。Discovery SourceフィールドはLANDeskがレコードを更新する許可された最後のソースであったものの、Reconciliation Rule（調整ルール）により許可されなかったことを反映しています」。"},
{t:"試験対策",q:"cmdb_datasource_last_update.listテーブルの用途として正しいものはどれか？",o:["すべてのCIの作成履歴を記録する","Reconciliation Ruleがどのデータソースがレコードとそのフィールド属性を最後に更新したかを特定するために使用するData Source Histories（データソース履歴）テーブル。Reconciliation Ruleはこのテーブルを活用する","重複CIを管理するテーブル","孤立CIを管理するテーブル"],a:1,e:"注記：「Reconciliation Rule（調整ルール）はData Source Histories（データソース履歴）[cmdb_datasource_last_update]テーブルを使用して、どのデータソースがレコードとそのフィールド属性を最後に更新したかを特定します」。"}
]});
L.push({c:"Course 7",l:"7-12",t:"Data Refresh Ruleを作成する",
s:`Data Refresh Ruleを作成する`,
p:[],
q:[
{t:"基礎",q:"シナリオ12でData Refresh Rule（データ更新ルール）が必要な理由として正しいものはどれか？",o:["LANDeskが常にServiceNowより高い優先度を持つべきだから","ServiceNowがWindows ServerレコードのDiscovery・更新を停止した場合、データが古くなる可能性がある。Data Refresh Ruleにより一定期間内にServiceNowが更新しない場合にLANDeskが更新できるようにする","ServiceNowのReconciliation Ruleを削除するため","LANDeskのみを使用するように切り替えるため"],a:1,e:"シナリオ：「Cloud DimensionsはServiceNowがCMDB内のWindows ServerレコードのDiscovery・更新を停止した場合、時間が経つにつれてデータが古くなることを懸念している」。Data Refresh Ruleにより一定期間（7日）更新がない場合にLANDeskの更新を許可する。"},
{t:"基礎",q:"シナリオ12でData Refresh Ruleの設定として正しいものはどれか？",o:["Windows Serverレコードが3日以上更新されていない場合にLANDeskからの更新を許可する","Windows Serverレコードが過去7日以内にDiscovery Source ServiceNowによって更新されていない場合にLANDeskからの更新を許可する Data Refresh Ruleを作成する","Windows Serverレコードが30日以上更新されていない場合にLANDeskからの更新を許可する","Windows Serverレコードが常にLANDeskによって更新される"],a:1,e:"要件：「Windows Serverレコードが過去7日以内にDiscovery Source ServiceNowによって更新されていない場合に、LANDeskからの更新を許可するData Refresh Ruleを作成する必要があります」。7日間の期間が重要。"},
{t:"試験対策",q:"Static Reconciliation Rule・Data Refresh Rule・Identification Ruleの違いとして正しいものはどれか？",o:["3つはすべて同じ機能","Identification Rule：CIを一意に識別するルール。Static Reconciliation Rule：どのDiscovery Sourceがフィールドを更新できるか（優先度）を定義するルール。Data Refresh Rule：高優先度ソースが一定期間内に更新しない場合に低優先度ソースが更新できるようにするルール","Reconciliation RuleはIdentification Ruleの別名","Data Refresh RuleはOrphan Ruleの別名"],a:1,e:"3つのルールの違い：①Identification Rule：CIを一意に識別する②Static Reconciliation Rule：Discovery Sourceの優先度と更新権限を定義③Data Refresh Rule：高優先度ソースが指定期間内に更新しない場合に低優先度ソースの更新を許可。シナリオ9・12・6でそれぞれ使用。"}
]});
L.push({c:"Course 7",l:"7-13",t:"Data Refresh Ruleをテストする",
s:`Data Refresh Ruleをテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ13でData Refresh Ruleのテストに使用するサーバーとして正しいものはどれか？",o:["OWA-SD-01","SPLI-WIN-Server（ServiceNowによって7日以上前に最後に更新されたサーバー）","OWA-SD-02","ANY-WIN-Server"],a:1,e:"要件：「SPLI-WIN-Serverという名前のWindowsServerは、ServiceNowによって7日以上前に最後に更新されたWindowsServerテーブルに既に存在します。このシナリオではServiceNow Discoveryはサーバーとの接続を失っています」。7日以上更新のないSPLI-WIN-Serverをテストに使用する。"},
{t:"検証",q:"シナリオ13の検証でSPLI-WIN-SERVERに関して確認すべき内容として正しいものはどれか？",o:["RAMが2048に更新されていること","①Windows Serverモジュールで、SPLI-WIN-SERVERのRAMが4096に更新されていること②cmdb_datasource_last_update.listでRAMフィールドがデータソースLANDeskによって最後に更新されたことを確認する","RAMが変更されていないこと","Discovery SourceがServiceNowのままであること"],a:1,e:"検証条件：①SPLI-WIN-SERVERのRAMが4096に更新②cmdb_datasource_last_update.listでRAMフィールドがLANDeskによって最後に更新されたことを確認。Data Refresh Ruleが機能し7日以上更新のないレコードをLANDeskが更新できた。"},
{t:"試験対策",q:"シナリオ13でData Refresh Ruleが機能した結果として正しいものはどれか？",o:["ServiceNowがSPLI-WIN-SERVERを更新した","Data Refresh Ruleにより、ServiceNowが7日以上更新していないWindows ServerレコードのRAMフィールドをLANDesk（低優先度ソース）が更新できた。これはStatic Reconciliation Ruleの例外として機能する","SPLI-WIN-SERVERが削除された","Reconciliation Ruleが無効化された"],a:1,e:"注記：「Discovery Source LANDeskのWindowsServerレコードは、前のタスクで構成されたData Refresh RuleによりServiceNowによって最後に更新されたWindows Server上のRAMフィールドを更新することができました」。Data Refresh RuleはStatic Reconciliation Ruleの時間ベースの例外として機能する。"}
]});
L.push({c:"Course 7",l:"7-14",t:"Dynamic Reconciliation Ruleを作成する",
s:`Dynamic Reconciliation Ruleを作成する`,
p:[],
q:[
{t:"基礎",q:"シナリオ14でDynamic Reconciliation Rule（動的調整ルール）を作成するクラスとして正しいものはどれか？",o:["Server（cmdb_ci_server）クラス","Windows Server（cmdb_ci_win_server）クラス","Email Serverクラス","UNIX Serverクラス"],a:1,e:"要件：「CI Class Managerで、Windows ServerクラスのDynamic Reconciliation Ruleを作成します」。Windows Serverクラスに動的調整ルールを設定する。"},
{t:"基礎",q:"シナリオ14でRAM属性に設定するルールタイプとして正しいものはどれか？",o:["First Reported（最初の報告）","Largest Value（最大値）","Smallest Value（最小値）","Last Reported（前回の報告）"],a:1,e:"要件：「RAM属性のルールタイプをLargest Value（最大値）に設定します」。Multisource CMDBに保存されているすべてのDiscovery Sourceの値の中で最大値でCMDBを更新する。"},
{t:"試験対策",q:"Dynamic Reconciliation Ruleが使用できるルールタイプとして原文に記載されているものをすべて含む選択肢はどれか？",o:["First Reported・Last Reported・Most Reportedの3種類","First Reported・Last Reported・Most Reported・Largest Value・Smallest Valueの5種類","First Reported・Largest Valueの2種類のみ","すべての数値フィールドに適用できる任意の計算式"],a:1,e:"原文：「Dynamic Reconciliation Ruleは以下のようなルールタイプに基づいて各フィールドの更新に適用できます：First Reported（最初の報告）・Last Reported（前回の報告）・Most Reported（最近の報告）・Largest Value（最大値）・Smallest Value（最小値）」の5種類。"},
{t:"引っ掛け",q:"Dynamic Reconciliation RuleのLargest ValueとSmallest Valueルールタイプに関する制限として正しいものはどれか？",o:["すべてのフィールドタイプに適用できる","数値フィールド型にのみ適用できる。これらのルールタイプを使用する場合は属性の選択タブに数値フィールド型のみが表示される","テキストフィールドにのみ適用できる","日付フィールドにのみ適用できる"],a:1,e:"Dynamic Reconciliation RuleのLargest Value・Smallest Valueは数値フィールド型にのみ適用できる。属性の選択タブには数値フィールド型のみが表示される。RAMは数値フィールドのため適用可能。"}
]});
L.push({c:"Course 7",l:"7-15",t:"Dynamic Reconciliation Ruleをテストする",
s:`Dynamic Reconciliation Ruleをテストする`,
p:[],
q:[
{t:"基礎",q:"シナリオ15でDynamic Reconciliation Ruleが適用された結果、OWA-SD-01のRAMフィールドが更新される値として正しいものはどれか？",o:["スクリプトに記載されたServiceNowのRAM値2048","Multisource CMDBに保存されているLANDeskのRAM値4096（最大値のため）","スクリプト実行前のRAM値4096のまま変わらない","RAMが0にリセットされる"],a:1,e:"検証条件：「OWA-SD-01という名前のサーバーのRAMフィールドが、Multisource CMDBに含まれる最大値である4096に更新されていることを確認する」。スクリプトには2048と記載されているが、Largest ValueルールによりMultisource CMDBの最大値4096が適用される。"},
{t:"引っ掛け",q:"シナリオ15でスクリプトにRAM: 2048が記載されているにもかかわらずOWA-SD-01のRAMが4096になる理由として正しいものはどれか？",o:["スクリプトに誤りがある","Dynamic Reconciliation Rule（Largest Value）がMultisource CMDBのすべてのDiscovery Sourceの値を参照し、最大値（LANDeskの4096）でCMDBを更新するため。スクリプトの値（2048）よりMultisource CMDBの最大値が優先される","ServiceNowが自動的に最大値を選択するから","LANDeskのReconciliation Ruleが優先されるから"],a:1,e:"注記：「Windows Serverレコードには、スクリプトに2048と示されていたにもかかわらず、RAMが4096と表示されます。これは前のタスクで作成されたDynamic Reconciliation Ruleによるものです」。Largest ValueルールがMultisource CMDBのすべての値から最大値を選択する。"},
{t:"試験対策",q:"Static Reconciliation RuleとDynamic Reconciliation Ruleの主な違いとして正しいものはどれか？",o:["両者は同じ機能を提供する","Static Reconciliation Rule：どのDiscovery Sourceがフィールドを更新できるか（優先度・順序）を定義する。Dynamic Reconciliation Rule：Multisource CMDBのデータを活用してFirst/Last/Most Reported・Largest/Smallest Valueなどの基準に基づいて値を選択する。同一属性に両方がある場合はDynamicが優先される","Static Reconciliation RuleはMultisource CMDBが必要","Dynamic Reconciliation RuleはOrder Valueで優先度を定義する"],a:1,e:"Static Reconciliation RuleはDiscovery Sourceの優先度（Order Value）で更新権限を定義。Dynamic Reconciliation RuleはMultisource CMDBのデータを基にFirst/Last/Most Reported・Largest/Smallest Valueで値を選択。同一属性に両方がある場合はDynamic Reconciliation Ruleが優先される（Dynamic wins over Static）。"}
]});

L.push({c:"Course 8",l:"8-1",t:"Terminology and Initial Considerations（用語と基礎概念）",
s:`Terminology and Initial Considerations\nコース：CSDM Fundamentals（約30分）\n\nMarkとScottの対話形式で、CSDMを実装・活用する際に最初に理解すべき用語と基礎概念を解説するレッスンです。\n\n【必須暗記】3種類のApplicationオブジェクト\n・cmdb_ci_appl → Application：最も古いテーブル。ポートフォリオ管理・設計用途。運用（ITSM）には使わない\n・cmdb_ci_service → Application Service：CSDMで最重要オブジェクト。業務アプリの「インスタンス」を表す。インシデント・変更管理等で使用\n・cmdb_ci_business_app → Business Application：ビジネス視点でのアプリケーション定義\n\nApplication ServiceはService Instance型であり、同一ビジネスアプリでも環境（dev/QA/prod）や地域（EMEA/APACなど）ごとに別インスタンスとして記録する。\n\n【必須理解】3種類のサービスと役割\n・Application Service（cmdb_ci_service）：テクノロジーの実インスタンス。CIのスタックと結びつく中心オブジェクト\n・Business Service：ビジネスがそのテクノロジーを利用する側の視点。技術障害時の業務影響を把握するために使用\n・Technology Management Service（旧称：Technical Service）：テクノロジーを提供・維持管理する支援グループの視点。オーナーシップと責任範囲を示す\n\n【試験頻出】CSDM 5のドメイン構成（6ドメイン）\n・Foundation：Location / Company / Group などの参照データ。CMDBの基盤データ。最初に整備すべき領域\n・Ideation & Strategy：製品アイデアのキャプチャ・投資判断。CSDM 5で新設（CSDM 4には存在しない）\n・Design & Planning：設計段階のオブジェクト\n・Build & Integrate：構築・統合\n・Service Delivery：サービス提供（サービスインスタンス、技術スタック等）\n・Service Consumption：サービス消費・ビジネスオファリング\n\n【モデル読解】関係タイプとReferenceの違い\n・Cardinality（矢印）：方向を持つ正式な関係タイプ（Relationship）。CMDBのRelationship tableに格納される\n・Reference：関係タイプではなく、フィールドレベルの参照（Reference field）。別の挙動・意味を持つ\n\n【ガバナンスとペルソナ】\n・ペルソナはServiceNow上のロールと1対1対応ではない（試験で誤答を誘うポイント）\n・成功するCSDM実装にはガバナンス体制と複数チームの協力が不可欠\n・重要ペルソナ例：Data Steward（基盤データ管理）、Contract Manager、CMDB Manager\n・CSDM 5のコンテンツカットオフは2025年5月\n\n【新ビジュアル】CSDM 5のダイアグラム変更\n・従来図：全オブジェクトを一度に表示 → 初見者には難解\n・CSDM 5：左から右へのライフサイクルフロー形式に変更。データの実体・関係性は変わらず「見せ方」を改善`,
p:[

["3種類のApplicationオブジェクト②","cmdb_ci_service → Application Service：CSDMで最重要オブジェクト。業務アプリの「インスタンス」を表す。インシデント・変更管理等で使用","Service Instance型。環境（dev/QA/prod）や地域（EMEA/APAC）ごとに別インスタンスとして記録"],

["Application Service（cmdb_ci_service）","テクノロジーの実インスタンス。CIのスタックと結びつく中心オブジェクト","インシデント・変更管理等ITSMで使用するのはApplication Service"],
["Business Service","ビジネスがそのテクノロジーを利用する側の視点。技術障害時の業務影響を把握するために使用","Technology Management Serviceと混同しないこと"],

q:[
{t:"基礎",q:"ServiceNow CMDBにおいて「Application」という言葉に対応する3つのテーブルとして正しい組み合わせはどれか？",o:["cmdb_ci_appl / cmdb_ci_service / cmdb_ci_business_app","cmdb_ci_appl / cmdb_ci_server / cmdb_ci_business_app","cmdb_ci_application / cmdb_ci_service / cmdb_ci_business_app","cmdb_ci_appl / cmdb_ci_service / cmdb_ci_application"],a:0,e:"正解はA。3つのApplicationオブジェクト：①cmdb_ci_appl（Application）②cmdb_ci_service（Application Service）③cmdb_ci_business_app（Business Application）。それぞれ用途が全く異なる。"},
{t:"基礎",q:"cmdb_ci_appl（Application）テーブルの主な用途として正しいものはどれか？",o:["インシデントや変更管理などのITSM運用に使用する","ポートフォリオ管理・設計用途に使用する。運用（ITSM）には使わない","ビジネス視点でのアプリケーション定義に使用する","テクノロジーの実インスタンスを表すために使用する"],a:1,e:"cmdb_ci_appl（Application）は最も古いテーブルで、ポートフォリオ管理・設計用途に使用する。インシデント・変更管理などのITSM運用には使わない。ITSMで使用するのはcmdb_ci_service（Application Service）。"},
{t:"基礎",q:"インシデント管理や変更管理などのITSMで使用するCSDM最重要オブジェクトとして正しいものはどれか？",o:["Application（cmdb_ci_appl）","Business Application（cmdb_ci_business_app）","Application Service（cmdb_ci_service）","Technology Management Service"],a:2,e:"CSDMで最重要オブジェクトはApplication Service（cmdb_ci_service）。業務アプリの「インスタンス」を表し、インシデント・変更管理等のITSMで使用する。Service Instance型であり、環境（dev/QA/prod）や地域（EMEA/APACなど）ごとに別インスタンスとして記録する。"},
{t:"引っ掛け",q:"Application Service（cmdb_ci_service）がService Instance型であることの意味として正しいものはどれか？",o:["同一ビジネスアプリは1つのCIレコードのみで管理する","同一ビジネスアプリでも環境（dev/QA/prod）や地域（EMEA/APACなど）ごとに別インスタンスとして別のCIレコードを記録する","ビジネスアプリは必ずBusiness Applicationテーブルで管理する","Application ServiceはITSMでは使用しない"],a:1,e:"Application ServiceはService Instance型であり、同一ビジネスアプリでも環境（dev/QA/prod）や地域（EMEA/APACなど）ごとに別のインスタンスとして別のCIレコードを記録する。これにより環境ごとの詳細な管理が可能になる。"},
{t:"基礎",q:"3種類のサービスのうち「技術障害時の業務影響を把握するために使用する、ビジネスがテクノロジーを利用する側の視点」を表すサービスはどれか？",o:["Application Service（cmdb_ci_service）","Business Service","Technology Management Service（旧称：Technical Service）","Service Offering"],a:1,e:"Business Serviceはビジネスがテクノロジーを利用する側（消費側）の視点。技術障害時の業務影響を把握するために使用する。Application Service：テクノロジーの実インスタンス。Technology Management Service：テクノロジーを提供・維持管理する支援グループの視点（提供側）。"},
{t:"基礎",q:"Technology Management Service（旧称：Technical Service）の役割として正しいものはどれか？",o:["ビジネスがテクノロジーを消費する側の視点を表す","テクノロジーを提供・維持管理する支援グループの視点。オーナーシップと責任範囲を示す","業務アプリのインスタンスをITSMで管理する","ポートフォリオ管理・設計用途に使用する"],a:1,e:"Technology Management Service（旧称：Technical Service）はテクノロジーを提供・維持管理する支援グループの視点。オーナーシップと責任範囲を示す。「提供側」の視点であり、「消費側」はBusiness Service。"},
{t:"試験対策",q:"CSDM 5で新設されたドメインとして正しいものはどれか？（CSDM 4には存在しないドメイン）",o:["Foundation","Service Delivery","Ideation & Strategy","Design & Planning"],a:2,e:"正解はC「Ideation & Strategy」。CSDM 5で新設されたドメインで、製品アイデアのキャプチャ・投資判断を担う。CSDM 4には存在しない。CSDM 5の6ドメイン：Foundation / Ideation & Strategy（新設）/ Design & Planning / Build & Integrate / Service Delivery / Service Consumption。"},
{t:"基礎",q:"CSDM 5の6つのドメインとして正しい組み合わせはどれか？",o:["Foundation / Discovery / Design & Planning / Build & Integrate / Service Delivery / Service Consumption","Foundation / Ideation & Strategy / Design & Planning / Build & Integrate / Service Delivery / Service Consumption","Foundation / Ideation & Strategy / Design & Planning / Build & Integrate / Service Management / Service Consumption","Foundation / Ideation & Strategy / Architecture / Build & Integrate / Service Delivery / Service Consumption"],a:1,e:"CSDM 5の6ドメイン：Foundation / Ideation & Strategy（CSDM 5で新設）/ Design & Planning / Build & Integrate / Service Delivery / Service Consumption。"},
{t:"基礎",q:"CSDMのFoundationドメインに含まれる主なデータとして正しいものはどれか？",o:["Application ServiceとBusiness Application","製品アイデアと投資判断データ","Location / Company / Groupなどの参照データ。CMDBの基盤データで最初に整備すべき領域","サービスインスタンスと技術スタック"],a:2,e:"Foundationドメインにはlocation（場所）/ Company（会社）/ Group（グループ）などの参照データが含まれる。CMDBの基盤データであり、他のすべてのドメインの前に最初に整備すべき領域。"},
{t:"試験対策",q:"CSDMのデータモデルにおける「Cardinality（関係タイプ）」と「Reference（参照）」の違いとして正しいものはどれか？",o:["CaridinalityとReferenceは同じ意味で使用される","Cardinality（矢印）は正式な関係タイプでCMDBのRelationship tableに格納される。Referenceはフィールドレベルの参照（Reference field）で別の挙動・意味を持つ","Referenceは正式な関係タイプでRelationship tableに格納される。Cardinalityはフィールドレベルの参照","どちらもCMDBのRelationship tableに格納される"],a:1,e:"Cardinality（矢印）：方向を持つ正式な関係タイプ（Relationship）。CMDBのRelationship tableに格納される。Reference：関係タイプではなく、フィールドレベルの参照（Reference field）。別の挙動・意味を持つ。CMDBのデータモデル問題で出題される重要な区別。"},
{t:"引っ掛け",q:"CSDMのペルソナ（Persona）とServiceNowのロール（Role）の関係として正しいものはどれか？",o:["ペルソナはServiceNow上のロールと1対1で対応している","ペルソナはServiceNow上のロールと1対1対応ではない","ペルソナはロールと同じ概念であり区別する必要はない","ペルソナはServiceNowのシステム上には存在しない概念"],a:1,e:"ペルソナはServiceNow上のロールと1対1対応ではない。これは試験で誤答を誘うポイント。重要ペルソナ例：Data Steward（基盤データ管理）・Contract Manager・CMDB Manager。成功するCSDM実装にはガバナンス体制と複数チームの協力が不可欠。"},
{t:"基礎",q:"CSDM 5で導入された新しいダイアグラム表現の特徴として正しいものはどれか？",o:["全オブジェクトを一度に表示する従来の複雑なダイアグラムを維持した","左から右へのライフサイクルフロー形式に変更。データの実体・関係性は変わらず「見せ方」を改善した","ダイアグラムを廃止しテーブル形式のみで表現する","3Dビジュアライゼーションを導入した"],a:1,e:"CSDM 5では従来の複雑なダイアグラム（全オブジェクトを一度に表示→初見者には難解）を廃し、左から右へのライフサイクルフロー形式という新しいビジュアル表現が導入された。データの実体・関係性は変わらず「見せ方」を改善。"},
{t:"試験対策",q:"CSDM 5のコンテンツカットオフ（Store App + Familyリリース）はいつか？",o:["2024年12月","2025年3月","2025年5月","2025年9月"],a:2,e:"CSDM 5のコンテンツカットオフは2025年5月（Store App + Familyリリース）。"},
]});
