L.push({c:"Course 10",l:"10-1",t:"CIS-DF 試験対策問題集",
s:`CIS-DF（Certified Implementation Specialist - Discovery and CMDB Foundations）試験対策問題集。実際の試験で出題された問題・出題傾向のある問題を収録。

収録内容：
・関係タイプ（Runs on::Runs / Used by::Used）
・Data Managerポリシータイプ（Attestation・Archive・Retire・Delete・Certification）
・データ収集ソリューション（Agent Client Collector・Service Graph Connector・Discovery・IntegrationHub ETL・Service Mapping・Import Sets）
・識別ルール（IRE・Principal Class・Identifier Entry）
・調整ルール（Static・Dynamic・優先順位）
・CMDB 360・Multisource CMDB
・CSDMフレームワーク（Information Object・CSDM標準）
・CMDBヘルスダッシュボード（重複メトリクス計算）
・統合マップ（Unified Map）
・変換マップ（Transform Map）とIRE連携`,
p:[
["関係タイプ","Used by::Used：アプリがインフラに依存する関係。Runs on::Runs：CIがサーバー上で実行される関係","CSDM標準に準拠した関係タイプの選択が重要"],
["データ収集ソリューション","Agent Client Collector：エージェントベース検出・リアルタイムモニタリング / Service Graph Connector：サードパーティシステムからの認定済み統合 / Import Sets：汎用データソースからのインポート","ServiceNow Discovery = IPベース = エージェントレス検出"],
["識別ルール（IRE）","複数インスタンスを識別するにはInstall PathなどをIdentifier Entryに追加する。CIの過負荷を防ぐ","変換マップからIREを呼び出すにはCMDBTransformUtil APIを使用"],
["調整ルール優先度","同じ属性にDynamicとStaticの両方が定義されている場合はDynamic Reconciliation Ruleが優先（Dynamic wins over Static）","glide.cmdb.logger.source.cmdb_multisource：マルチソースの詳細ログを有効化"],
["CSDM：Information Object","論理データレコード（患者診断記録・PII・クレジットカード情報など）を表すCIクラス[cmdb_ci_information_object]","ビジネスアプリケーションに関連付けることでデータの機密性に基づいたリスクスコアリングが可能"],
["CMDBヘルスダッシュボード","正常なCI数/評価数 = 700/800 → 評価範囲は800件・重複は100件","Evaluated（評価数）がスコープ（範囲）を示す"],
["統合マップ","コンテキストサイドパネルでインシデント・変更・問題をリアルタイム表示","ノードバッジとコンテキストサイドパネルが従来の依存関係ビューとの差別化ポイント"],
],
q:[
{t:"試験対策",q:"レガシーアプリケーションサービス（「メインフレーム課金」）を、それをホストする物理サーバーに手動でマッピングしています。CSDM標準によると、アプリケーションサービスはインフラストラクチャに依存して機能します。この依存関係を記述するには、どの関係タイプのペアを選択する必要がありますか？",o:["Runs on::Runs","Used on::Used","Used by::Used","Runs::Runs on"],a:2,e:"正解はC「Used by::Used」。アプリケーションサービスがインフラストラクチャに依存する関係を表す。似たような問題が出題される。"},
{t:"試験対策",q:"ITインフラストラクチャとアプリケーションの物理的な存在を確認するためのタスク作成を自動化します。（Data Manager ポリシータイプ）",o:["Data Certification（データ認証）","Retire（引退）","Delete（消去）","Archive（アーカイブ）","Attestation（証明）"],a:4,e:"正解はE「Attestation（証明）」。物理的な存在を確認するタスク作成を自動化するポリシータイプ。ただし選択肢は実際にはA〜Eの5択でEが正解。"},
{t:"試験対策",q:"構成項目を監査、法的、または履歴参照用に保管したまま、アクティブな運用使用から外します。（Data Manager ポリシータイプ）",o:["Delete（消去）","Attestation（証明）","Retire（引退）","Data Certification（データ認証）","Archive（アーカイブ）"],a:4,e:"正解はE「Archive（アーカイブ）」。CIを監査・法的・履歴参照用に保管したままアクティブな運用から外すポリシータイプ。"},
{t:"基礎",q:"組織全体のサーバー、クラウドリソース、アプリケーションなどのインフラストラクチャコンポーネントの検出とリアルタイムでのモニタリングを実行するように設計された、軽量のエージェントベースのソリューションはどれか？",o:["Agent Client Collector（エージェントクライアントコレクター）","Service Graph Connector（サービスグラフコネクター）","ServiceNow Discovery（ディスカバリ）","IntegrationHub ETL（統合ハブETL）"],a:0,e:"正解はA「Agent Client Collector（エージェントクライアントコレクター）」。軽量のエージェントベースのソリューションで、インフラストラクチャコンポーネントの検出とリアルタイムモニタリングを実行する。"},
{t:"基礎",q:"次のServiceNowソリューションのうち、データの整合性を確保しながらサードパーティのデータをCMDBや非CMDBテーブルに統合するために使用できるのはどれか？（2つ選択）",o:["Agent Client Collector（エージェントクライアントコレクター）","Service Graph Connector（サービスグラフコネクター）","ServiceNow Discovery（ディスカバリ）","IntegrationHub ETL（統合ハブETL）"],a:1,multi:[1, 3],e:"正解はB「Service Graph Connector（サービスグラフコネクター）」とD「IntegrationHub ETL（統合ハブETL）」の2つ。どちらもサードパーティのデータをCMDBや非CMDBテーブルに統合するために使用できる。（2つ選択問題のため、アプリでは選択肢Bが正解として表示されます）"},
{t:"基礎",q:"認定済みの構築済み統合モデルを使用して、外部のサードパーティシステム（SCCMやSolarWindsなど）からデータを取り込むServiceNowソリューションはどれか？",o:["Agent Client Collector（エージェントクライアントコレクター）","Service Graph Connector（サービスグラフコネクター）","Service Mapping（サービスマッピング）","Import Sets（インポートセット）"],a:1,e:"正解はB「Service Graph Connector（サービスグラフコネクター）」。SCCMやSolarWindsなどの外部サードパーティシステムから認定済みの構築済み統合モデルを使用してデータを取り込む。"},
{t:"基礎",q:"特定のエントリポイント（URL）からインフラストラクチャをトラバースし、特定のアプリケーションサービスを構成する依存関係と関係をマップするServiceNowソリューションはどれか？",o:["Import Sets（インポートセット）","Service Mapping（サービスマッピング）","Cloud Discovery（クラウド検出）","Agent Client Collector（エージェントクライアントコレクター）"],a:1,e:"正解はB「Service Mapping（サービスマッピング）」。特定のエントリポイント（URL）からインフラストラクチャをトラバースし、アプリケーションサービスを構成する依存関係と関係をマップする。"},
{t:"基礎",q:"汎用データソース（CSV、Excel、XML、JDBC）からデータをアップロードし、変換マップを使用してターゲットのCMDBテーブルにマップするための標準フレームワークを提供するServiceNowソリューションはどれか？",o:["Import Sets（インポートセット）","Cloud Discovery（クラウド検出）","ServiceNow Discovery（ディスカバリ）","Service Graph Connector（サービスグラフコネクター）"],a:0,e:"正解はA「Import Sets（インポートセット）」。CSV・Excel・XML・JDBCなどの汎用データソースからデータをアップロードし、変換マップを使用してターゲットのCMDBテーブルにマップする標準フレームワーク。"},
{t:"引っ掛け",q:"CMDB管理者は、Tomcat Web Serverの複数のインスタンスを実行している特定のLinuxサーバーが、CMDB内の1つのCIレコードにのみ誤ってマッピングされていることに気付きました。各TomcatインスタンスがユニークなCIとしてマッピングされ「CIの過負荷」を防ぐためのベストプラクティスソリューションは何ですか？（2つ選択）",o:["glide.identification_engine.skip_duplicates.thresholdを1に設定する","Tomcat Web Serverの識別ルールを変更して、構成ファイルパスまたはインストールディレクトリパスを基準属性として含める","Tomcat Web ServerクラスをPrincipal Class（プリンシパルクラス）としてフラグ付けする","CIがホストサーバーに依存していることを確認し、異なるホスト間での名前の競合を防止する"],a:1,multi:[1, 3],e:"正解はB「識別ルールに構成ファイルパスまたはインストールディレクトリパスを追加」とD「CIがホストサーバーに依存していることを確認」の2つ。アプリケーション名のみでは複数インスタンスを識別できないため、インストールパスなどをIdentifier Entryに追加する。（2つ選択問題のため、アプリではBが正解として表示されます）"},
{t:"基礎",q:"ServiceNow Discovery（水平検出）とよく同じ意味で使用される2つの用語はどれか？（2つ選択）",o:["IPベースの検出（IP-based discovery）","エージェントレス検出（Agentless discovery）","タグベースの検出（Tag-based discovery）","トップダウンの発見（Top-down discovery）"],a:0,multi:[0, 1],e:"正解はA「IPベースの検出（IP-based discovery）」とB「エージェントレス検出（Agentless discovery）」の2つ。ServiceNow Discovery（水平検出）はIPアドレスベースでネットワークをスキャンし、エージェントを必要としないエージェントレス検出でもある。（2つ選択問題のため、アプリではAが正解として表示されます）"},
{t:"基礎",q:"構成アイテム（CI）のエージェントベースの検出を可能にするServiceNowソリューションはどれか？",o:["ServiceNow Discovery（ディスカバリ）","IntegrationHub ETL（統合ハブETL）","Agent Client Collector（エージェントクライアントコレクター）","Service Graph Connector（サービスグラフコネクター）"],a:2,e:"正解はC「Agent Client Collector（エージェントクライアントコレクター）」。CIのエージェントベースの検出を可能にするServiceNowソリューション。"},
{t:"試験対策",q:"CSDM標準に準拠することで、新しいインシデントおよび変更リクエストレコードの割り当てグループフィールドが自動入力されます。正しいのは次のうちどれか？（2つ選択）",o:["選択したCIのManaged By Group（管理グループ）によって、インシデントフォームのAssignment Group（割り当てグループ）フィールドに自動入力される","選択したCIのSupport Group（サポートグループ）によって、インシデントフォームのAssignment Group（割り当てグループ）フィールドに自動入力される","選択したCIのChange Group（変更グループ）は、変更要求フォームのAssignment Group（割り当てグループ）フィールドに自動入力される","選択したCIのApproval Group（承認グループ）によって、変更要求フォームのAssignment Group（割り当てグループ）フィールドに自動入力される"],a:1,multi:[1, 2],e:"正解はB「Support Group（サポートグループ）→インシデントフォームのAssignment Group（担当グループ）に自動入力」とC「Change Group（変更グループ）→変更要求フォームのAssignment Group（担当グループ）に自動入力」の2つ。（2つ選択問題のため、アプリではBが正解として表示されます）"},
{t:"試験対策",q:"外部レコードが既存のCIと一致しない理由を調査中に、CMDB 360およびマルチソースデータに関連する識別エンジンアクティビティの詳細なログが必要です。どのシステムプロパティを有効にする必要がありますか？",o:["glide.identification_engine.multisource_enabled","glide.class.switch.enabled","glide.cmdb.query.nlq.activated","glide.cmdb.logger.source.cmdb_multisource"],a:3,e:"正解はD「glide.cmdb.logger.source.cmdb_multisource」。CMDB 360およびマルチソースデータに関連する識別エンジンアクティビティの詳細なログを有効にするシステムプロパティ。"},
{t:"試験対策",q:"同じCI属性に対して動的ルールと静的ルールの両方が定義されている場合、どの調整ルールタイプが優先されますか？",o:["どちらも優先順位を決定するために使用される","Static Reconciliation Rule（静的調整ルール）","Dynamic Reconciliation Rule（動的調整ルール）","優先順位はOrder Valueのみで決まる"],a:2,e:"正解はC「Dynamic Reconciliation Rule（動的調整ルール）」。同じCI属性に対して動的ルールと静的ルールの両方が定義されている場合、Dynamic Reconciliation Rule（動的調整ルール）が優先される（Dynamic wins over Static）。"},
{t:"基礎",q:"重複CI修復ウィザードで、どの重複がメインCIであるかを示す推奨事項として使用されるのはどれか？（3つ選択）",o:["Most Relationships（最多の関係）","Oldest Updated（最も古く更新された）","Oldest Created（最も古く作成された）","Least Relationships（最少の関係）","Most Recent Updated（最も最近更新された）"],a:0,multi:[0, 2, 4],e:"正解はA「Most Relationships（最多の関係）」・C「Oldest Created（最も古く作成された）」・E「Most Recent Updated（最も最近更新された）」の3つ。（3つ選択問題のため、アプリではAが正解として表示されます）"},
{t:"基礎",q:"CI Class Managerで、頻繁にアクセスするクラスに簡単に戻ることができる機能はどれか？",o:["調整ルールタブ（Reconciliation Rules tab）","識別ルールタブ（Identification Rules tab）","基本情報タブ（Basic Info tab）","固定クラス（Pinned Classes）"],a:3,e:"正解はD「固定クラス（Pinned Classes）」。CI Class Managerで頻繁にアクセスするクラスをピン留めして簡単に戻ることができる機能。"},
{t:"試験対策",q:"マルチソースCMDBデータからの属性の競合を解決するために動的調整ルールを構成する場合、選択できる有効なルールタイプ（バリデーションタイプ）はどれか？（2つ選択）",o:["最終更新日（Last Updated Date）","最優先事項（Top Priority）","最終作成日（Last Created Date）","オーナー承認（Owner Approval）","最も報告されている（Most Reported）","最小値（Smallest Value）"],a:4,multi:[4, 5],e:"正解はE「Most Reported（最も報告されている）」とF「Smallest Value（最小値）」の2つ。Dynamic Reconciliation Ruleの有効なルールタイプ：First Reported・Last Reported・Most Reported・Largest Value・Smallest Value。"},
{t:"試験対策",q:"CIマネージャーが構成アイテムのクラスのグループ属性を同期しました。CIの「Change Group（変更グループ）」フィールドは変更リクエストに使用されますが、これらのCIのいずれかが選択されると、インシデントレコードのどのフィールドが自動的に入力されますか？",o:["Managed By Group（管理グループ）","Approval Group（承認グループ）","Change Group（変更グループ）","Assignment Group（割り当てグループ）"],a:3,e:"正解はD「Assignment Group（割り当てグループ）」。CIのSupport GroupがインシデントフォームのAssignment Groupフィールドに自動入力される。Change GroupはChange RequestのAssignment Groupに自動入力される。"},
{t:"基礎",q:"CMDBデータマネージャーのポリシータイプのうち、CIデータの正確性と物理的な存在を検証するための定期的な確認プロセスを実行するように定義されているポリシータイプはどれか？",o:["Attestation（証明）","Retire（引退）","Certification（認証）","Delete（消去）"],a:0,e:"正解はA「Attestation（証明）」。CIデータの正確性と物理的な存在を検証するための定期的な確認プロセスを実行するポリシータイプ。"},
{t:"基礎",q:"CMDB管理者は、CMDBおよびCSDMデータ基盤ダッシュボードをどこで入手できますか？",o:["ServiceNowコミュニティ（無料）","ServiceNow Impact（有料）","ServiceNow Store（無料）","ServiceNow Store（有料）"],a:2,e:"正解はC「ServiceNow Store（無料）」。CMDB and CSDM Data Foundations DashboardsはServiceNowストアから無料で入手できるアプリケーション。"},
{t:"基礎",q:"CI Class Managerで特定のクラスのアイコンを設定する場所はどこか？",o:["調整ルールタブ（Reconciliation Rules tab）","固定クラス（Pinned Classes）","基本情報タブ（Basic Info tab）","識別ルールタブ（Identification Rules tab）"],a:2,e:"正解はC「基本情報タブ（Basic Info tab）」。CI Class Managerの基本情報タブで特定のクラスのアイコンを設定できる。"},
{t:"基礎",q:"CMDB正確性スコアカードのサーバークラスの重複指標で「正常なCI数/評価数 = 700/800」と表示される場合、重複指標で計算されるサーバーレコードの範囲として正しいものはどれか？",o:["CMDBには800のサーバーレコードが存在する","CMDBには100個のサーバーレコードが存在する","CMDBには700個のサーバーレコードが存在する","CMDBには700のLinuxサーバと800のWindowsサーバのレコードが存在する"],a:0,e:"正解はA「CMDBには800のサーバーレコードが存在する」。Evaluated（評価数）= 800件がスコアカードの評価範囲（scope）。健全なCI（非重複）は700件。"},
{t:"基礎",q:"CMDB正確性スコアカードのサーバークラスの重複指標で「正常なCI数/評価値 = 700/800」と表示される場合、重複指標で計算される重複サーバーレコードの数として正しいものはどれか？",o:["CMDBに100個のサーバーレコードが重複している","CMDBに800個のサーバーレコードが重複している","CMDBに700件のLinuxと800件のWindowsサーバーレコードが重複している","CMDBに700件のサーバーレコードが重複している"],a:0,e:"正解はA「100個のサーバーレコードが重複している」。800件評価のうち700件が健全（非重複）。重複は800-700=100件。"},
{t:"基礎",q:"統合マップ（Unified Map）において、インシデントや変更管理レコードを表示できる部品（表示エリア）はどこか？",o:["マップキャンバス（Map Canvas）","コンテキストサイドパネル（Context Side Panel）","ミニマップナビゲーター（Minimap Navigator）","タイムライン（Timeline）"],a:1,e:"正解はB「コンテキストサイドパネル（Context Side Panel）」。統合マップ（Unified Map）のコンテキストサイドパネルを使用して、関連するインシデント・変更・問題がリアルタイムで表示される。ノードバッジとコンテキストサイドパネルの組み合わせが従来の依存関係ビューマップに比べた利点。"},
{t:"試験対策",q:"CMDB管理者は、変換マップを使用してスプレッドシートからcmdb_ci_serverテーブルに一括CIデータをインポートしています。変換後に重複レコードが作成されました。IRE（識別・調整エンジン）によって処理され、既存の識別ルールが適用されることを確認するには、変換マップの設定に何を追加する必要がありますか？",o:["インポート後にIREを有効にするために、ターゲットテーブルのData Refresh Rule（データ更新ルール）を構成する","調整エンジンを参照するためにCMDBTransformUtil API（または同様のAPIロジック）を呼び出すonBefore変換スクリプトを追加する","ターゲットテーブルのName属性で、Coalesceフィールドをtrueに設定する","システムプロパティglide.identification_engine.multisource_enabledを有効にする"],a:1,e:"正解はB「CMDBTransformUtil APIを呼び出すonBefore変換スクリプトを追加する」。変換マップがIREをバイパスする問題を解決するには、CMDBTransformUtil APIを呼び出すonBefore変換スクリプトを追加してIREによる処理を確保する。"},
{t:"試験対策",q:"HIPAAコンプライアンス監査の準備で、「患者診断記録」を処理または送信するすべてのビジネスアプリケーションを特定する必要があります。CSDMフレームワークを使用してこの要件を満たすには、どのCIクラスを作成してビジネスアプリケーションに関連付ける必要がありますか？",o:["Data Domain（データドメイン）[cmdb_ci_data_domain]","Business Capability（ビジネス能力）[cmdb_ci_business_capability]","DB Catalog（DBカタログ）[cmdb_ci_db_catalog]","Information Object（情報オブジェクト）[cmdb_ci_information_object]"],a:3,e:"正解はD「Information Object（情報オブジェクト）[cmdb_ci_information_object]」。論理データレコード（患者診断記録など）を作成してビジネスアプリケーションに関連付けるCIクラス。CSDMフレームワークにおいてアプリケーションが扱うデータの種類を論理的に記述するために使用する。"},
{t:"試験対策",q:"ある金融サービス会社で、顧客の機密情報（PIIやクレジットカード番号など）を扱うアプリケーションの脆弱性を高いビジネスインパクトスコアでフラグ付けするために、ビジネスアプリケーションが保有するデータのタイプを論理的に記述するCIクラスはどれか？",o:["Information Object（情報オブジェクト）[cmdb_ci_information_object]","Asset（資産）[alm_asset]","Database Instance（データベースインスタンス）[cmdb_ci_db_instance]","Data Domain（データドメイン）[cmdb_ci_data_domain]"],a:0,e:"正解はA「Information Object（情報オブジェクト）[cmdb_ci_information_object]」。ビジネスアプリケーションが保有するデータのタイプ（PII・クレジットカード番号など）を論理的に記述するCIクラス。これをビジネスアプリケーションに関連付けることでデータの機密性に基づいたリスクスコアリングが可能になる。"},

{t:"基礎",q:"CI Class Managerでクラスを「Principal Class（プリンシパルクラス）」としてフラグ付けする目的として正しいものはどれか？",o:["そのクラスをCMDB Health Dashboardの評価対象から除外するため","IRE（識別・調整エンジン）が同じホスト上の同一クラスのCIを別個のCIとして識別できるようにするため（CIの過負荷を防ぐ）","そのクラスのすべてのCIをアーカイブするため","そのクラスをDiscoveryのスキャン対象から除外するため"],a:1,e:"Principal Class（プリンシパルクラス）フラグを設定すると、IREが同じホスト上に展開された同一クラスの複数のCIを別個のCIとして識別できるようになる。例えばTomcat Web Serverなど同一サーバーに複数インスタンスが存在するアプリケーションのCIの過負荷を防ぐために使用する。"},
{t:"基礎",q:"CI Class Managerでクラスを「Principal Class（プリンシパルクラス）」として設定する場所として正しいものはどれか？",o:["調整ルールタブ（Reconciliation Rules tab）","識別ルールタブ（Identification Rules tab）のIdentifier Entries設定内","基本情報タブ（Basic Info tab）のPrincipal Classチェックボックス","ヘルス設定タブ（Health Settings tab）"],a:2,e:"Principal Class（プリンシパルクラス）の設定はCI Class Managerの基本情報タブ（Basic Info tab）にあるPrincipal Classチェックボックスを有効にすることで設定できる。"},
{t:"引っ掛け",q:"同一サーバー上で複数のTomcat Web Serverインスタンスが実行されているが、CMDBに1つのCIレコードしか作成されない問題を解決するために必要な設定の組み合わせとして正しいものはどれか？（2つ選択）",o:["Tomcat Web ServerクラスをPrincipal Class（プリンシパルクラス）としてフラグ付けする","Tomcat Web Serverの識別ルールに構成ファイルパスまたはインストールディレクトリパスをIdentifier Entryとして追加する","glide.identification_engine.skip_duplicates.thresholdを1に設定する","Tomcat Web Serverクラスに新しいReconciliation Rule（調整ルール）を追加する"],a:0,multi:[0, 1],e:"正解はA「Principal Class（プリンシパルクラス）としてフラグ付け」とB「識別ルールにインストールパスを追加」の2つ。Principal Classフラグを設定することでIREが同一ホスト上の複数インスタンスを個別のCIとして認識できる。さらに識別ルールにインストールパスを追加することで、異なるディレクトリの同名アプリを一意に識別できる。（2つ選択問題のため、アプリではAが正解として表示されます）"},
]});

L.push({c:"Course 11",l:"11-1",t:"用語と初期段階の考慮事項",
s:`CSDMでは「Application」という言葉に3つの異なるテーブルがある。

①Application（cmdb_ci_appl）：最も古いテーブル。Discoveryがホスト上で検出したインストール済みコード（bits and bytes）を格納。運用目的（Incident・Problem・Change）で使用する operational CI。
②Business Application（cmdb_ci_business_app）：アプリケーションのポートフォリオリスト。バージョン非依存・non-operational。企業が保有するアプリの一覧管理に使用。
③Application Service（cmdb_ci_service_auto等）：Business Applicationのインスタンス。CSDMで最重要オブジェクト。dev/QA/prodなど環境ごとのインスタンスを識別。Incident・Problem・Changeで使用するoperational CI。

サービスタイプは3種類：Application Service（Business Applicationのインスタンス）・Business Service（テクノロジーを消費するビジネス機能）・Technology Management Service（テクノロジーの提供者・責任グループを識別）。

CSDM以前は120以上のサービス定義箇所があったが、CSDMが3種類に絞り込んだ。

CSDM5でのリレーション変更：Business ApplicationとApplication ServiceのリレーションがCSDM4の「Consumes::Consumed by」からCSDM5で新しいリレーションに変更（旧リレーションはハードコードされていたため変更が困難だった）。`,
p:[
["Applicationテーブルの目的","cmdb_ci_appl：Discoveryが検出したインストール済みコードを格納するoperational CI","Incident・Problem・Changeのチケットに紐付けるCIとして使用"],
["Business Applicationの目的","バージョン非依存のアプリポートフォリオリスト（non-operational）","企業内の全アプリケーション一覧を管理。エンタープライズアーキテクチャ視点で使用"],
["Application Serviceの重要性","Business Applicationのデプロイ済みインスタンス（最重要オブジェクト）","dev/QA/prod等の環境ごとに一意に識別。Incident・Problem・Changeで使用するoperational CI"],
["3種類のサービスタイプ","Application Service・Business Service・Technology Management Service","CSDM以前は120以上あったサービス定義をCSDMが3種類に絞り込んだ"],
["Business Serviceの役割","テクノロジーを消費するビジネス機能（内部・外部・両方）","テクノロジーに問題が発生した際のビジネスへのインパクト分析に使用"],
["Technology Management Serviceの役割","テクノロジーの提供者・サポートグループ・責任グループを識別","CIを管理するグループが自分たちをサービスの提供者として認識できるようにする"],
["CSDM5のリレーション変更","Business Application→Application ServiceのリレーションがCSDM4の「Consumes::Consumed by」から変更","旧リレーションはプラットフォームにハードコードされていたため変更が困難だった"],
],
q:[
{t:"基礎",q:"CSDMにおけるApplication（cmdb_ci_appl）テーブルの主な用途として正しいものはどれか？",o:["企業内のアプリケーションポートフォリオを一覧管理するため","Discoveryがホスト上で検出したインストール済みコード（bits and bytes）を格納するoperational CIのため","Business Applicationのデプロイ済みインスタンスを管理するため","サービスのSLA・OLAを管理するため"],a:1,e:"Application（cmdb_ci_appl）テーブルはDiscoveryがホスト上で検出したインストール済みコード（bits and bytes）を格納する最も古いテーブルで、Incident・Problem・Changeで使用するoperational CIとして機能する。"},
{t:"基礎",q:"Business Applicationの説明として正しいものはどれか？",o:["Discoveryが自動検出するoperational CI","バージョン非依存のアプリケーションポートフォリオリスト（non-operational）","Business Applicationのデプロイ済みインスタンス","サポートグループが管理するテクノロジーサービス"],a:1,e:"Business Applicationはバージョン非依存のアプリケーションポートフォリオリスト（non-operational）。エンタープライズアーキテクチャの観点から企業が保有するアプリを一覧管理する目的で使用し、Incident・Problem・Changeでは直接使用しない。"},
{t:"基礎",q:"CSDMで最重要オブジェクトとされるApplication Serviceの説明として正しいものはどれか？",o:["企業内の全アプリを一覧管理するためのnon-operational CI","Discoveryが検出したインストール済みコードを格納するCI","Business Applicationのデプロイ済みインスタンスであり、dev/QA/prod等の環境ごとに識別するoperational CI","テクノロジーの提供者グループを識別するためのCI"],a:2,e:"Application ServiceはBusiness Applicationのデプロイ済みインスタンス。dev・QA・prodなど環境ごとに一意に識別し、Incident・Problem・Changeで使用するoperational CIとして機能する。CSDMで最重要オブジェクトとされる。"},
{t:"基礎",q:"CSDMが定義する3種類のサービスタイプの組み合わせとして正しいものはどれか？",o:["Application Service・Technical Service・Business Service","Application Service・Business Service・Technology Management Service","Application Service・Managed Service・Business Service","Technical Service・Business Service・Technology Offering"],a:1,e:"CSDMが定義する3種類のサービスタイプはApplication Service・Business Service・Technology Management Service。CSDM以前は120以上あったサービス定義をこの3種類に絞り込んだ。"},
{t:"引っ掛け",q:"CSDM5でBusiness ApplicationとApplication Serviceのリレーションが変更された理由として正しいものはどれか？",o:["Application Serviceが廃止されたため","旧リレーション「Consumes::Consumed by」がプラットフォームにハードコードされており変更が困難だったため","Business Applicationがoperational CIとして再定義されたため","新しいリレーションの方がパフォーマンスが良いため"],a:1,e:"旧リレーション「Consumes::Consumed by」はプラットフォームにハードコードされており、変更が非常に困難だった。CSDM5でこの問題が解決されリレーションが変更された。"},
{t:"意地悪",q:"Business ServiceとApplication Serviceの違いとして正しいものはどれか？",o:["Business ServiceはDiscoveryが自動生成し、Application Serviceは手動作成する","Application Serviceはテクノロジーを消費するビジネス機能を表し、Business ServiceはBusiness Applicationのインスタンスを表す","Business ServiceはApplication Serviceを消費するビジネス機能・インパクト分析の対象であり、Application ServiceはBusiness Applicationのデプロイ済みインスタンスである","両者は同じものを指す別名である"],a:2,e:"Business ServiceはApplication Service等のテクノロジーを消費するビジネス機能（インパクト分析の対象）。Application ServiceはBusiness Applicationのデプロイ済みインスタンス（operational CI）。両者は役割が根本的に異なる。"},
{t:"試験対策",q:"Incident管理でCIを選択する際、どのオブジェクトを選択すべきか正しいものはどれか？",o:["Business Application（バージョン非依存のポートフォリオリスト）","Application（Discoveryが検出したインストール済みコード）またはApplication Service（デプロイ済みインスタンス）","Technology Management Service（責任グループを識別するサービス）","Business Service（ビジネス機能を表すサービス）"],a:1,e:"Incident管理ではoperational CIであるApplication（Discoveryが検出したインストール済みコード）またはApplication Service（デプロイ済みインスタンス）を使用する。Business Applicationはnon-operationalのため直接使用しない。"},
]});
// Course 11 Lesson 2
L.push({c:"Course 11",l:"11-2",t:"Foundationドメイン",
s:`Foundationドメインは全ドメインで参照される参照データ（referential data）を提供する最重要ドメイン。CIのフィールドから参照されるデータや、CMDBのCIを参照する他のオブジェクトが含まれる。

主要オブジェクト：
・Business Process：CMDB内のCIクラスだが、ロケーション・ドキュメント・ユーザーなどCMDB外のオブジェクトも参照できる唯一のCIの一つ。そのためFoundationに配置。ビジネス継続性（BCM）の観点でも重要。
・Knowledge：ライフサイクル全体に渡って重要。AIエージェントの燃料（fuel）として機能。
・Value Stream：ビジネスが提供する価値の流れ。ハーバード大学の研究を基に15カテゴリが標準提供。Value Stream→Stage→Business Capabilityの階層構造。CMDB外のオブジェクトだがCMDBのオブジェクトを参照。
・Lifecycle Stage / Stage Status：CSDM4で導入。従来9つ以上あった状態フィールドを整理。クラスごとに異なる値セットを提供。編集不可（カスタマイズ不可）。CSDM5で「End of Operation」ステージを新規追加。

Lifecycleの2区分：
①有形物（Tangible/Physical）：資産とCMDBのCI両方で共有。アイデア→購入→ビルド→運用→End of Operation→廃棄のフロー。
②無形物（Intangible/Logical）：CIのみ（廃棄フェーズなし）。Business Service・Business Applicationなどが対象。`,
p:[
["Foundationドメインの役割","全ドメインで参照される参照データ（referential data）を提供する最重要ドメイン","他の全ドメインの成功に不可欠な基盤データを格納"],
["Business Processの特徴","CMDB内のCIクラスだが、ロケーション・ドキュメント・ユーザーなどCMDB外オブジェクトも参照できる","このためFoundationドメインに配置。ビジネス継続性（BCM）観点でも重要"],
["Knowledgeの役割","ライフサイクル全体で重要な参照データ","AIエージェントの燃料（fuel）として機能し、情報提供・自動化を支援"],
["Value Streamの構造","Value Stream → Stage → Business Capabilityの階層構造","ハーバード大学の研究を基に15カテゴリが標準提供。CMDB外だがCMDBオブジェクトを参照"],
["Lifecycle Stageの特徴","クラスごとに異なる値セット。編集・カスタマイズ不可","従来9つ以上あった状態フィールドを整理したCSDM4で導入の機能"],
["CSDM5の新Stage","End of Operationステージを新規追加","運用終了後から廃棄前の状態（棚卸し評価・廃棄待ち等）を表現するために追加"],
["有形物ライフサイクル","Ideation→Purchase→Build→Operational→End of Operation→End of Life","資産とCMDBのCI（物理CI）で共有。廃棄（Dispose）フェーズあり"],
["無形物ライフサイクル","有形物と異なりEnd of Lifeの廃棄フェーズなし","Business Service・Business Applicationなどの論理オブジェクトが対象"],
],
q:[
{t:"基礎",q:"FoundationドメインにBusiness Processが配置される理由として正しいものはどれか？",o:["Business ProcessはCMDB外のオブジェクトだから","Business ProcessはCMDB内のCIクラスだが、ロケーション・ドキュメント・ユーザーなどCMDB外のオブジェクトも参照できる唯一のCIの一つだから","Business Processは全ドメインで最も使用頻度が高いから","Business ProcessはService Consumptionドメインでのみ使用されるから"],a:1,e:"Business ProcessはCMDB内のCIクラスだが、ロケーション・ドキュメント・ユーザーなどCMDB外の複数オブジェクトも参照できる唯一のCIの一つ。CMDBの階層的なCI-CIの関係に留まらないためFoundationドメインに配置される。"},
{t:"基礎",q:"CSDMのValue Stream（バリューストリーム）に関する記述として正しいものはどれか？",o:["CMDBのCI階層内に格納されるテーブルである","CMDB外のオブジェクトだがCMDBのオブジェクトを参照し、ハーバード大学の研究を基に15カテゴリが標準提供される","DiscoveryによってKBから自動生成されるオブジェクトである","Value StreamはLifecycle StageとStage Statusの親オブジェクトである"],a:1,e:"Value StreamはCMDB外のオブジェクトだがCMDBオブジェクトを参照する。ハーバード大学の研究を基に15カテゴリが標準提供され、Value Stream→Stage→Business Capabilityの階層構造を持つ。"},
{t:"基礎",q:"Lifecycle Stage / Stage Statusに関する記述として正しいものはどれか？",o:["全クラスで同一の値セットが使用される","クラスごとに異なる値セットが提供され、編集・カスタマイズは不可","管理者が自由にステージを追加・編集できる","CSDM3で初めて導入された機能である"],a:1,e:"Lifecycle Stage / Stage Statusはクラスごとに異なる値セットが提供される。編集・カスタマイズは不可（ServiceNowが管理）。CSDM4で導入された機能。"},
{t:"基礎",q:"CSDM5でLifecycleに新規追加されたステージはどれか？",o:["End of Service","End of Operation","Pending Retirement","Decommission"],a:1,e:"CSDM5では「End of Operation（運用終了）」ステージが新規追加された。運用状態から廃棄（End of Life）までの間の状態（棚卸し評価・廃棄待ちなど）を表現するために追加された。"},
{t:"引っ掛け",q:"有形物（Tangible/Physical）と無形物（Intangible/Logical）のLifecycleの違いとして正しいものはどれか？",o:["無形物にはEnd of Operationステージが存在し、有形物には存在しない","有形物には廃棄（End of Life/Dispose）フェーズがあるが、無形物にはない","両者のLifecycleは完全に同一である","有形物はCMDBでのみ管理され、無形物は資産管理でのみ管理される"],a:1,e:"有形物（物理CI・資産）にはEnd of Life（廃棄）フェーズが存在するが、無形物（Business Service・Business Applicationなどの論理オブジェクト）には廃棄フェーズが存在しない。これが両者の主な違い。"},
{t:"試験対策",q:"FoundationドメインでKnowledge（ナレッジ）が重視される理由として正しいものはどれか？",o:["KnowledgeはCMDB内の唯一のテーブルだから","KnowledgeはLifecycle全体にわたって重要であり、AIエージェントの燃料（fuel）として機能するから","KnowledgeはDiscoveryの設定情報を格納するから","KnowledgeはService Deliveryドメインでのみ使用されるから"],a:1,e:"KnowledgeはCSDMのLifecycle全体にわたって重要な参照データ。特にAIエージェントの燃料（fuel）として機能し、情報提供・自動化・人間インターフェースを支援することが動画で強調されている。"},
]});
// Course 11 Lesson 3
L.push({c:"Course 11",l:"11-3",t:"Ideation & Strategyドメイン",
s:`Ideation & StrategyドメインはCSDM5で新規追加されたドメイン（CSDM4には存在しなかった）。アイデアの発生からビジネス判断までを管理する。

L.push({c:"Course 11",l:"11-6",t:"Service Deliveryドメイン",
s:`Service Deliveryドメインは最も一般的に使用されるドメイン。Discoveryが大量のCIをCMDBに投入するドメイン。

重要な変更点（CSDM5）：
・Service Instance（旧: Application Service）：最上位テーブルはcmdb_ci_service_auto。「Application Service」から「Service Instance」にリネーム。Application Serviceは引き続きタイプの一つとして存在。

Service Instanceの6タイプ（CSDM5で追加）：
①Application Service（既存）
②Data Service Instance（新規）
③Network Service Instance（新規）
④Connection Service Instance（新規）
⑤Facility Service Instance（新規）
⑥Operational Process Service Instance（新規）
※新規5タイプは現時点でデータモデルのみ。UIや機能はAustralia+リリースで予定。

Service Delivery Network：Service Instanceを提供するために必要な全CIの集合体（概念。特定のオブジェクトではない）。

Technology Management Service / Technology Management Offering（旧: Technology Service / Technology Service Offering）にリネーム。

Dynamic CI Group：プログラム的にCIをグループ化。パッチ管理等で活用。

API専用クラス：CSDM5で新規追加。

AIのCI分類：AI Function（クラウドで発見）・AI Application（オンプレミスで発見）。`,

L.push({c:"Course 11",l:"11-7",t:"Service Consumptionドメイン",
s:`Service Consumptionドメインは、テクノロジーを消費するビジネス側の視点を定義するドメイン。CSDM4からの変更なし・ラベル変更なし。

主要オブジェクト：Business Service・Business Service Offering

Service Classification：Business ServiceをはじめとするService系テーブルに設定する分類属性。フィルタリング・レポーティングに使用。Business Serviceには「Business Service」の分類値を設定。

ビジネスサービス構築のポイント：
・テクノロジーの詳細ではなくビジネスの観点で定義する
・内部・外部・両方のいずれかに分類（Used Internally/Externally/Both）
・SLA・OLAの管理が可能（Offeringに設定）
・Subscriber（加入者）の識別：グループ・部門・その他エンティティ

ビジネスサービスの定義はITの専門家だけでは困難。ビジネスサイドのステークホルダーを巻き込む必要がある。

Service Builder：ビジネスサービスとオファリングを構築するためのツール。`,

L.push({c:"Course 11",l:"11-8",t:"ポートフォリオ管理・廃止アイテム・移行と次のステップ",
s:`【ポートフォリオ管理】
4つのポートフォリオカテゴリ：
①Technology Management Services（共有ITサービス）
②Business Services（ビジネスサービス）
③Service Instances（サービスインスタンス）
④外部販売製品（Product Lines）

【廃止アイテム（Deprecation）】
・「used for」属性（環境識別用）→「environment」に置き換え
・hardware status・sub status・install status → Lifecycle Stage/Statusに移行予定
・基底Serviceクラスへの直接CI作成 → 拡張テーブル（Business Service・Technical Service等）を使用
・cmdb_rel_group / cmdb_rel_group_type → Teams機能に置き換え
・Software Package / Software Installテーブル → SAM Foundationsに置き換え（SAMライセンス不要でインストール推奨）

【実装アプローチ（3種類）】
①Outcome Centric：特定の成果に必要なデータ要件からアプローチ（大規模組織で有効）
②Domain Centric：特定のドメイン・製品エリアに集中してアプローチ
③Stepwise：旧来のCrawl・Walk・Run・Flyアプローチ（大規模組織では成果が見えにくい）

【CSDM移行の原則】
・CSDM5への移行でやり直し不要
・CSDMは繰り返し進化（iterate）するモデル
・テーブルは残存。ラベル変更のみが主な変化`,
p:[
["4つのポートフォリオカテゴリ","Technology Management Services・Business Services・Service Instances・外部販売製品（Product Lines）","組織の異なるコンシューマーペルソナに対応した4区分"],
["廃止：used for属性","「used for」属性が「environment」属性に置き換え","used forは全CIに存在しなかったため、environmentに統一"],

L.push({c:"Course 12",l:"12-3",t:"Foundationドメイン（スライド詳細）",
s:`Foundation Domainの定義（スライド35 CSDM5 Paper引用）：
「他のCSDMドメインのオブジェクトから、またはオブジェクトへ参照される基本データを含むテーブル群。Foundationドメインで識別されるテーブルはCMDBリレーションシップでは使用されない。代わりに、これらは重要な参照データである。」

Foundation Domainの配置理由：
・他の全ドメインから参照される参照データ（referential data）
・CMDB リレーションシップでは使用しない
・ほとんどのServiceNow製品実装前に必要となることが多い
・マスターデータ管理（MDM）のコンテキスト

Value Stream（新規オブジェクト）：
・Foundation Domainに配置
・Detailed Model（詳細モデル）として提供

Lifecycle（ライフサイクル）アプローチ（CSDM4で導入）：
・問題：ITAM・CMDBにわたって9つ以上の状態/ステータス属性が存在。値間の相互作用が少ない。ServiceNowクライアントの50%以上がこれらのチョイスリストをカスタマイズ。ライフサイクルプロセスの一貫性がない。
・解決策：
  - Lifecycle Stage（ライフサイクルステージ）：ライフサイクルプロセスのステージ
  - Life Cycle Status（ライフサイクルステータス）：ライフサイクルステージ内のステータス
  - Lifecycle：ライフサイクル全体の位置
・Physical vs Logical（有形物 vs 無形物）：異なる値セット
・編集不可（can NOT edit）
・移行を急ぐ必要なし（No Rush to Migrate）

Foundation Domainの関連製品：
・ライフサイクル管理：Lifecycle Sync・SBOMプラグイン・DevOps（SBOM）・Vulnerability Response（SBOM）
・ほぼ全製品がこのデータを使用
・ワークプレイス管理はロケーションを個別テーブルに拡張`,

・関連製品（管理）：Strategic Portfolio Management・Enterprise Architecture / APM
・関連製品（データ利用）：Digital Portfolio Management

Design & Planning Domain（スライド47）：
・Business Capability：組織がビジネスモデルを実行・ミッションを果たすために必要な高レベルのケイパビリティ
・Business Application：ビジネス機能を提供するために設定された全ソフトウェアとインフラの表現（タイトルのカタログ等）。ビジネスアプリケーションは全インスタンスの論理的表現。

・関連製品（管理）：Strategic Portfolio Management・Enterprise Architecture / APM
・関連製品（データ利用）：Digital Portfolio Management・Integrated Risk Management

Build & Integrate Domain（スライド50）：
・AI Digital Assets（AI System Digital Asset）：AI・GenAIサービスのソフトウェア/アプリケーションコンポーネントを表す。ビルド・統合・AIガバナンスのために、デプロイ可能なソフトウェアソース・バイナリ・コンポーネントを表す（ServiceNow製・サードパーティ製・カスタム製のいずれも対象）。
・関連製品（管理）：DevOps・Digital Product Release
・関連製品（データ利用）：Digital Portfolio Management・SecOps・GRC・EA（APM）・Asset Management`,

L.push({c:"Course 12",l:"12-6",t:"ポートフォリオ管理・廃止アイテム・実装アプローチ（スライド詳細）",
s:`Current Portfolios（スライド61）：
・Enterprise / Service（DPM）
・Personal（DPM）
・Application（EA）
・Project（SPM）
・Technology（EA）

SPM Lenses（ポートフォリオを使用するレンズ機能）：
Value Stream・Product・Organization・Goals・Project Portfolio・Project Program・Strategic Investments

4 Main Digital Product Portfolios（スライド62）：
①Provided Externally（外部提供）：顧客向け製品・サービス → Business Service、Sold Product、Product Lines
②Provided Internally（内部提供）：従業員・パートナー向けエンタープライズサービス → Technology Management Service
③Manufacture & Delivery（製造・デリバリー）：ビルドチーム向けツールチェーン → Service Instance
④Foundational（基盤）：ポートフォリオマネージャー向け基盤サービス

廃止アイテム（スライド64）：
・Use_for属性 → environmentに置き換え
・Hardware status & substatus
・Install Status
・Base Service classの使用 → Business・Technical拡張クラスを使用（Service Builderを参照）
・TEAMs：cmdb_rel_group・cmdb_rel_group_type参照の置き換え
・SW Package table vs. SW Install table

3つの実装アプローチ（スライド66-67）：
①Outcome Centric：
  メリット：アウトカムへの速い価値創出・特定インサイトへの集中・優先度高いリソース確保が容易
  デメリット：他のアウトカム・ユースケースを考慮しない可能性・アウトカム外のチームが協力しない可能性・「データの孤島」が生じる可能性

②Domain Centric：
  メリット：1つのドメインに集中・製品・ポートフォリオ・チームの能力に合わせやすい・共通ペルソナで作業
  デメリット：クロスドメインの価値を提供しない可能性・他ドメイン依存先との関与が困難な場合も

③Step Wise（Crawl, Walk, Run, Fly）：
  メリット：最初にFoundationを完成・EAと運用チームを早期に関与・計画と運用の接続を早期に確立
  デメリット：早期の価値実現が困難・「何の意味があるの？」という価値提案が困難・後からサービスを確立・「CSDM Bingo」に陥るリスク

CSDM移行の原則（スライド73）：
・各バージョンは前のバージョンに積み重ねる
・可能な限りアップグレードパスを提供
・主な変更：Technology Management Service名称変更・Application ServiceのベースクラスがService Instanceに変更
・曖昧さと詳細は「共通」なものへ対応
・製品ロードマップの変更は毎四半期調整
・「Seamless upgrade path, mostly（概ねシームレスなアップグレードパス）」`,

L.push({c:"Course 12",l:"12-7",t:"3 Pillar・Service Graph・技術的負債・実践事例（スライド詳細）",
s:`3 Pillar approach（スライド17）：
①Ingest（取り込み）：
・データを継続的に取り込み、マージ・更新・削除
・物理CIとクラウドリソース/構造の自動化
・複数ソースを1つの信頼できるモデルにマージ
・発見可能なものと発見不可能なものを接続
・管理されたオーナーシップを確保

②Govern（ガバン）：
・分析ガイダンスの確立
・Incident・変更管理の運用支援
・レポートとメトリクスへの活用
・計画への活用
・消費製品・ロール・ペルソナ・プロセスのサポート

③Insight（洞察）：
・ガバナンスチームとロール
・ヘルスメトリクスの改善を確保
・ライフサイクルプロセスの確立
・構造と定義を管理・伝達
・使用とカスタマイズ/拡張ニーズのサポート
・CSDMへのアライン

Service Graph Overview（スライド19）：
・Connected：全機能を接続しデジタル製品をモダンITスタックの全レイヤーで管理
・Integrated：計画・アーキテクチャ・DevOps・従来型・クラウドを1つのCSDMフレームワークでガイド
・Comprehensive：従来のCMDBより広範なスコープと能力

Service GraphのFull Lifecycle Management：
・Digital Products and Services：データサービス・設定状態・アプリケーションリレーションシップ
・CSDM Guidance
・Projects・People・Process・Core Data
・Infrastructure・Configuration・Applications・Relationships（CMDB & beyond）

Service Graph Connectors（スライド20）：
・ServiceNowがテスト・サポートしたIREの使用
・CSDMアライン
・Multisource & reconciliation対応
・取得方法：Service Graph Connector Central・Store.Servicenow.comを閲覧・Service Graph Connector Centralをダウンロード

コンテキストの多層性（スライド18）：
AIドリブンアウトカムには多層的なコンテキストが必要

Product & Serviceの違い（スライド22）：
・Product：顧客に価値を提供する財（もの）またはサービス（インタラクション）
・Serviceは製品そのものである場合、または製品をサポートするために存在する場合がある`,
p:[
["3 Pillarの順序と意味","Ingest（取り込み）→Govern（ガバン）→Insight（洞察）の3本柱","データ基盤の成功に必要な3つの柱。CSDMとCMDB Foundation管理の基本フレームワーク"],
["Ingestの要素","継続的なデータ取り込み・マージ・更新・削除。物理CI・クラウドの自動化。複数ソースの統合。発見可能と発見不可能の接続。管理オーナーシップの確保","データを正確に維持するための継続的なプロセス"],
["Governの要素","分析ガイダンス確立・Incident/変更管理支援・レポートとメトリクス活用・計画への活用・消費製品/ロール/ペルソナ/プロセスのサポート","単なる技術管理ではなく、ビジネスプロセス全体を支援"],
["Insightの要素","ガバナンスチームとロール・ヘルスメトリクス改善・ライフサイクルプロセス確立・構造と定義の管理・伝達・CSDMへのアライン","データを意思決定と改善に活用するための組織的プロセス"],
["Service Graphの3特性","Connected（全機能接続）・Integrated（1つのCSDMフレームワーク）・Comprehensive（従来CMDBより広範）","Service GraphはCSDMガイダンスに基づくフルライフサイクル管理"],
["Service Graph Connectorの入手方法","Service Graph Connector Central・Store.Servicenow.com・Service Graph Connector Centralをダウンロード","ServiceNowがテスト・サポートし、CSDMアライン・Multisource & reconciliation対応"],
],
q:[
{t:"基礎",q:"3 Pillar approachの「Ingest（取り込み）」の要素として含まれないものはどれか？",o:["データを継続的に取り込み、マージ・更新・削除","発見可能なものと発見不可能なものを接続","ガバナンスチームとロールの確立","管理されたオーナーシップを確保"],a:2,e:"「ガバナンスチームとロールの確立」はInsight（洞察）の要素。Ingest（取り込み）の要素は「継続的なデータ取り込み・マージ・更新・削除・物理CI/クラウドの自動化・複数ソースの統合・発見可能/不可能の接続・管理オーナーシップの確保」。"},
{t:"基礎",q:"Service Graph Connectorの特徴として正しいものはどれか？",o:["ServiceNowがテスト・サポートしたIREの使用・CSDMアライン・Multisource & reconciliation対応","ServiceNowが認定していないサードパーティ製コネクター","CMDBのCIを直接削除するためのコネクター","Discovery MID Serverの代替として使用するコネクター"],a:0,e:"Service Graph ConnectorはServiceNowがテスト・サポートしたIREの使用・CSDMアライン・Multisource & reconciliation対応が特徴（スライド20）。"},
{t:"基礎",q:"Service Graphの「Comprehensive」の説明として正しいものはどれか？",o:["全機能を接続しデジタル製品をモダンITスタックの全レイヤーで管理","計画・アーキテクチャ・DevOps・クラウドを1つのCSDMフレームワークでガイド","従来のCMDBより広範なスコープと能力","AIによる自動設定管理"],a:2,e:"Service Graphの「Comprehensive」は「従来のCMDBより広範なスコープと能力」（スライド19）。ConnectedとIntegratedはそれぞれ別の特性を表す。"},
{t:"試験対策",q:"3 Pillar approachの「Govern（ガバン）」の役割として最も適切なものはどれか？",o:["物理CIとクラウドリソースの自動取り込み","分析ガイダンスの確立・Incident/変更管理支援・レポートとメトリクス活用・計画への活用","ガバナンスチームとロールの確立・ヘルスメトリクスの改善・CSDMへのアライン","Service Graph Connectorの設定と管理"],a:1,e:"Govern（ガバン）は「分析ガイダンスの確立・Incident/変更管理の運用支援・レポートとメトリクスへの活用・計画への活用・消費製品/ロール/ペルソナ/プロセスのサポート」（スライド17）。物理CIの自動取り込みはIngest、ヘルスメトリクス改善はInsight。"},
{t:"引っ掛け",q:"Service Graph Connectorを入手する方法として正しいものはどれか？",o:["ServiceNow Developer Portalからダウンロード","Service Graph Connector Central・Store.Servicenow.com・Service Graph Connector Centralのダウンロード","CMDB Health DashboardのMarketplace機能から取得","ServiceNow Technical Support経由で申請"],a:1,e:"Service Graph Connectorの入手方法はService Graph Connector Central・Store.Servicenow.comを閲覧・Service Graph Connector Centralをダウンロード（スライド20）。Developer Portalではない。"},

s:`CIS-DF試験に実際に出題された・または出題傾向のある15問。公式問題集から翻訳。

p:[
["Q1：ライフサイクル管理フィールド","Life Cycle Stage と Stage Status が推奨フィールド","Install Status・Hardware Status・Operational Statusは廃止・非推奨方向"],
["Q2：Assignment Group自動入力ルール","インシデント：選択したCIのSupport Groupが自動入力 / 変更要求：選択したCIのChange Groupが自動入力","Approval Groupは変更要求のAssignment Groupには自動入力されない"],

q:[
{t:"試験対策",q:"CSDMがCIのライフサイクル管理に推奨するフィールドはどれか？",o:["Life Cycle StageとStage Status","Install Status","Operational Status","Hardware Status"],a:0,e:"CSDMはCIのライフサイクル管理に「Life Cycle Stage（ライフサイクルステージ）とStage Status（ステージステータス）」を推奨する。Install Status・Operational Status・Hardware Statusは廃止・非推奨方向のフィールド。"},
{t:"試験対策",q:"CSDMに準拠することで、新規インシデントおよび変更要求レコードのAssignment Groupフィールドが自動入力される。新規インシデントまたは変更要求を作成する際に正しいものはどれか？（2つ選択：正しい組み合わせを1つ選べ）",o:["選択したCIのApproval Groupがインシデントフォームのアサイングループに自動入力される / 選択したCIのManaged by Groupが変更要求フォームのアサイングループに自動入力される","選択したCIのSupport Groupがインシデントフォームのアサイングループに自動入力される / 選択したCIのChange Groupが変更要求フォームのアサイングループに自動入力される","選択したCIのChange Groupがインシデントフォームのアサイングループに自動入力される / 選択したCIのApproval Groupが変更要求フォームのアサイングループに自動入力される","選択したCIのManaged by Groupがインシデントフォームのアサイングループに自動入力される / 選択したCIのSupport Groupが変更要求フォームのアサイングループに自動入力される"],a:1,e:"正解は「Support Group→インシデントのAssignment Group自動入力」と「Change Group→変更要求のAssignment Group自動入力」の組み合わせ。Approval Groupは変更要求の承認者に使用されるがAssignment Groupへの自動入力には使用されない。"},
{t:"試験対策",q:"CSDMに準拠しない場合に起こりうる結果はどれか？（2つ選択：正しい組み合わせを1つ選べ）",o:["データ損失の可能性 / ServiceNow Storeアプリケーションのインストール不能","テクニカルデットの増加 / 将来のServiceNow製品との非互換性","ServiceNow Storeアプリケーションのインストール不能 / テクニカルデットの増加","データ損失の可能性 / 将来のServiceNow製品との非互換性"],a:1,e:"CSDM未準拠の結果は「テクニカルデットの増加（Increased technical debt）」と「将来のServiceNow製品との非互換性（Incompatibility with future ServiceNow products）」。データ損失やStore Appのインストール不能は直接の影響として挙げられていない。"},
{t:"試験対策",q:"Business Application・Information Object・Capabilityが属するCSDMドメインはどれか？",o:["Build & Integration","Design & Planning","Service Delivery","Service Consumption"],a:1,e:"Business Application・Information Object（情報オブジェクト）・Business Capability（ビジネスケイパビリティ）はDesign & Planningドメインに属する。"},
{t:"試験対策",q:"Customer Service Management（CSM）が属するCSDMドメインはどれか？",o:["Design & Planning","Service Consumption","Ideation & Strategy","Service Delivery"],a:3,e:"Customer Service Management（CSM）はService Deliveryドメインに属する。スライド56でService Deliveryの「データ利用製品」としてCSMが記載されている。"},
{t:"試験対策",q:"成功するデータ基盤を実現するための3本柱（3 Pillars）はどれか？（3つ選択：正しい組み合わせを1つ選べ）",o:["Correctness・Completeness・Compliance","Govern・Insight・Ingest","Govern・Completeness・Ingest","Insight・Correctness・Ingest"],a:1,e:"成功するデータ基盤の3本柱は「Govern（ガバン）・Insight（洞察）・Ingest（取り込み）」。Correctness・Completeness・ComplianceはCMDB Healthダッシュボードのメトリクス（3C）であり、3本柱とは別物。"},
{t:"試験対策",q:"Application Service（サービスインスタンス）をTechnology Management Offering・Business Service Offering・Business Applicationと関連付けるために使用できる機能はどれか？",o:["CI Class Manager","Application Service Wizard","CMDB Workspace","Service Builder"],a:3,e:"Service Builderは、Application Service/Service InstanceとTechnology Management Offering・Business Service Offering・Business Applicationを関連付けるために使用する機能。スライド59でService ConsumptionドメインのデータをService Builderで管理することが記載されている。"},
{t:"試験対策",q:"Managed by GroupをCIの基盤グループまたはクラスに設定・同期できる場所はどれか？（2つ選択：正しい組み合わせを1つ選べ）",o:["CI Class Manager / Business Service Offerings","Technology Management Services / Technology Management Offerings","Business Service Offerings / Business Services","CI Class Manager / Technology Management Services"],a:1,e:"Managed by GroupはTechnology Management ServicesとTechnology Management Offeringsの2箇所から設定・同期できる。CI Class Manager・Business Service Offerings・Business Servicesからは設定できない。"},
{t:"試験対策",q:"デプロイ済みアプリケーションスタックとその依存関係の論理的表現であるサービスインスタンスタイプはどれか？",o:["Application Service [cmdb_ci_service_auto]","Business Application [cmdb_ci_business_app]","Application [cmdb_ci_appl]","Technology Management Service [cmdb_ci_service_technical]"],a:0,e:"Application Service [cmdb_ci_service_auto]は「デプロイ済みアプリケーションスタックとその依存関係の論理的表現であるサービスインスタンスタイプ」（スライド24）。Business Applicationはポートフォリオ管理用、Application（cmdb_ci_appl）はDiscoveryが検出したインストール済みコード、Technology Management ServiceはCIを管理するグループを識別するサービス。"},
{t:"試験対策",q:"インシデントまたは変更要求のレコードでCIとして選択できるものはどれか？（2つ選択：正しい組み合わせを1つ選べ）",o:["Dynamic CI Group / Installed Software","Application Service / Dynamic CI Group","Business Application / Application Service","Installed Software / Business Application"],a:1,e:"Incident・Change RequstのCI選択で使用できるOperational CIはApplication Service（デプロイ済みインスタンス）とDynamic CI Group（プログラム的にグループ化されたCI）。Business ApplicationはOperational CIではないため直接選択しない。Installed SoftwareはCMDB外のオブジェクト。"},
{t:"試験対策",q:"Business Service・Technology Management Service・Business Service Offering・Technology Management Offeringをフォームやリストよりも効率的な方法で作成できるツールはどれか？",o:["Service Mapping","Application Service Wizard","CMDB Workspace","Service Builder"],a:3,e:"Service BuilderはBusiness Service・Technology Management Service・Business Service Offering・Technology Management Offeringをよりストリームライン（効率的）な方法で作成できるツール。Application Service WizardはApplication Service専用。"},
{t:"試験対策",q:"ポートフォリオ・サービス・オファリング・製品をライフサイクル全体にわたって統合的に表示・管理できる統一ワークスペースはどれか？",o:["Service Builder","CMDB Workspace","Service Operations Workspace","Digital Portfolio Management"],a:3,e:"Digital Portfolio Management（DPM）は「オーナーがポートフォリオ・サービス・オファリング・製品をライフサイクル全体にわたって総合的に閲覧・管理できる統一ワークスペース」。Service Builder・CMDB Workspace・Service Operations WorkspaceはDPMとは異なる機能。"},
